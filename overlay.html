<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Monitor · Overlay</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  /* Mirrors the live monitor's overlay zone. One style only (compact), one
     layout only (vertical). Any CSS change in hr_monitor.html must be reflected
     here; one day extract shared CSS to a separate file. */
  :root {
    --bg: #0a0a0a;
    --bg-panel: #0a0a0a;
    --bg-input: #141414;
    --border: #1f1f1f;
    --text: #d8d8d8;
    --text-dim: #8a8a8a;
    --text-faint: #5a5a5a;
    --accent-hr: #E89858;
    --accent-rmssd: #5DCAA5;
    --warn-palp: #D76CBA;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    background: transparent;
    overflow: hidden;
  }
  body.bg-dark { background: var(--bg); }
  /* Chroma-key backgrounds for the Window-Capture popup path. OBS can key out
     a solid color; magenta is the classic chroma pick. */
  body.bg-magenta,
  body.bg-magenta #overlay-zone { background: #ff00ff; }
  body.bg-black,
  body.bg-black #overlay-zone { background: #000000; }

  #overlay-zone {
    background: transparent;
    /* Padding stays 0 in the overlay: the monitor measures .widget-row (no
       zone padding) and we pin #overlay-zone to that size. Any padding here
       would eat width and push the HRV column past the card edge. The widget
       itself carries internal padding, so the card still looks breathable. */
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
    width: fit-content;
    max-width: 100%;
  }
  body.bg-dark #overlay-zone { background: #000; }

  /* Widgets live inside this row. Only compact layout: one widget, stacks
     vertically under the warning-slot-above. */
  #overlay-zone .widget-row {
    display: flex;
    flex-direction: column;
    gap: 0;
    width: 100%;
  }

  .widget {
    background: #0a0a0a;
    border: 1px solid #1f1f1f;
    border-radius: 16px;
    padding: 14px 18px;
    position: relative;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 0;
    position: relative;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .widget-label {
    font-size: 14px; font-weight: 600;
    letter-spacing: 0.1em; color: #8a8a8a;
    text-transform: uppercase;
  }
  .heart-icon {
    width: 22px; height: 22px;
    fill: currentColor;
    animation: heartbeat 1s ease-in-out infinite;
    transition: color 0.4s;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.18); }
    30% { transform: scale(1); }
    45% { transform: scale(1.12); }
    60% { transform: scale(1); }
  }

  .big-number {
    font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    font-weight: 900;
    font-size: 64px;
    line-height: 1;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    transition: color 0.4s;
    text-align: left;
    padding: 0;
  }

  .number-row { display: flex; align-items: stretch; gap: 14px; }
  .number-row > .big-number { flex: 0 0 auto; }
  .inline-live-trace {
    flex: 1 1 0;
    min-width: 160px;
    position: relative;
    padding: 6px 0 10px;
    height: 68px;
    max-height: 68px;
    overflow: hidden;
  }
  .inline-live-trace canvas {
    width: 100% !important;
    height: 100% !important;
    max-height: 100% !important;
  }

  .pips { display: flex; gap: 6px; height: 6px; margin-top: 6px; }
  .pip { flex: 1; background: #1a1a1a; border-radius: 2px; transition: background 0.4s; }

  .stage-low { color: #7DB8E8; }
  .stage-low .pip.active { background: #7DB8E8; }
  .stage-normal { color: #B8D97E; }
  .stage-normal .pip.active { background: #B8D97E; }
  .stage-elevated { color: #F0C75E; }
  .stage-elevated .pip.active { background: #F0C75E; }
  .stage-high { color: #E89858; }
  .stage-high .pip.active { background: #E89858; }
  .stage-critical { color: #E24B4A; }
  .stage-critical .pip.active { background: #E24B4A; }

  .palp-chip {
    display: none;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(215,108,186,0.14);
    border: 1px solid var(--warn-palp);
    color: var(--warn-palp);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .palp-chip.active { display: inline-flex; }
  .palp-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--warn-palp);
    box-shadow: 0 0 6px var(--warn-palp);
  }

  /* Warning banner. Fixed width so every banner text renders at the same card
     width, which keeps the recommended OBS source size stable across warnings. */
  .warning-banner {
    display: none;
    align-items: center;
    justify-content: flex-start;
    gap: 6px;
    padding: 2px 9px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 150px;
    min-width: 150px;
    margin-left: auto;
  }
  .warning-banner.active { display: inline-flex; }
  .warning-banner.warn-high   { border-color: #E24B4A; background: rgba(226,75,74,0.14);  color: #E24B4A; }
  .warning-banner.warn-low    { border-color: #7DB8E8; background: rgba(125,184,232,0.12); color: #7DB8E8; }
  .warning-banner.warn-crash  { border-color: #BA7517; background: rgba(186,117,23,0.18); color: #F0C75E; }
  .warning-banner.warn-palp   { border-color: #D76CBA; background: rgba(215,108,186,0.18); color: #D76CBA; }
  .warning-banner.status-reconnecting { border-color: #6a6a6a; background: rgba(100,100,100,0.14); color: #b8b8b8; }
  .warning-banner.status-reconnecting .warning-banner-icon svg { animation: conn-pulse 1.4s ease-in-out infinite; }
  .warning-banner-icon { display: inline-flex; flex-shrink: 0; }
  .warning-banner-icon svg { width: 12px; height: 12px; fill: currentColor; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .warning-banner-text { overflow: hidden; text-overflow: ellipsis; }

  /* Compact widget grid. HR readout left, HRV readout right, combined trend
     spans full width at bottom. */
  #hr-widget {
    display: grid;
    grid-template-columns: 1.75fr 1fr;
    /* Fixed row heights match hr_monitor.html so toggling HRV can't make the
       widget grow taller. Row 4 (compact-trend) is auto-sized implicitly. */
    grid-template-rows: auto 68px 14px;
    gap: 10px 16px;
    align-items: start;
  }
  #hr-widget > .widget-header { grid-column: 1 / -1; grid-row: 1; }
  #hr-widget .number-row { grid-column: 1; grid-row: 2; }
  #hr-widget #hr-pips { grid-column: 1; grid-row: 3; }

  .compact-hrv {
    grid-column: 2; grid-row: 2 / 4;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-end;
    border-left: 1px solid #1f1f1f; padding-left: 16px;
  }
  .compact-hrv-label {
    font-size: 12px; color: #c8c8c8;
    text-transform: uppercase; letter-spacing: 0.12em;
    font-weight: 700; margin-bottom: 3px;
  }
  .compact-hrv-value {
    font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    font-weight: 900; font-size: 36px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    transition: color 0.4s;
  }
  .compact-hrv-unit {
    font-size: 11px; color: #9a9a9a;
    letter-spacing: 0.08em; text-transform: uppercase;
    font-weight: 600; margin-top: 4px;
  }
  #hr-widget > .compact-trend {
    grid-column: 1 / -1; grid-row: 4;
    height: 64px; position: relative;
    margin-top: 12px; padding: 6px 0 4px;
    border-top: 1px solid #1f1f1f;
  }

  /* Toggle rules. HR off: hide only the BPM readout (label, icon, big number,
     palp chip). Keep pips and live trace. HRV off: hide the HRV column and
     promote HR to full width. Both off: hide the whole widget. */
  body.no-hr #hr-widget .widget-label,
  body.no-hr #hr-widget .heart-icon,
  body.no-hr #hr-widget .palp-chip,
  body.no-hr #hr-widget .big-number { display: none !important; }

  body.no-hrv .compact-hrv { display: none !important; }
  body.no-hrv #hr-widget { grid-template-columns: 1fr !important; }

  body.no-hr.no-hrv #hr-widget { display: none !important; }

  /* Live HR trace toggle — only affects the inline trace in the HR column. */
  body.no-live-hr .inline-live-trace { display: none !important; }

  /* Mini trends toggle — only affects the combined HR+RMSSD line at the bottom. */
  body.no-inline-trends .compact-trend { display: none !important; }

  /* Palp chip + warning banner + conn dot each toggleable. */
  body.no-palp-chip .palp-chip,
  body.no-palp-chip #palp-chip { display: none !important; }
  body.no-warning .warning-banner { display: none !important; }
  body.no-conn-dot .conn-indicator { display: none !important; }

  /* Warning-slot-above reserves fixed height above the widget when the user
     picks "above" placement, so the widget never reflows when a warning fires. */
  .warning-slot-above { display: none; }
  body.warning-above .warning-slot-above {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 34px;
    padding: 2px 0;
  }
  body.warning-above.no-warning .warning-slot-above { display: none !important; }
  body.warning-above .widget-header > .warning-banner { display: none !important; }

  /* Waiting state when no tick has arrived yet. */
  #waiting {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: #5a5a5a; font-size: 13px;
    text-align: center; letter-spacing: 0.08em;
    pointer-events: none; padding: 16px;
    background: inherit;
  }
  #waiting .hint { font-size: 10px; color: #3a3a3a; }
  body.connected #waiting { display: none; }

  /* Connection indicator (absolute so it never pushes the widget wider). */
  .conn-indicator {
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }
  .conn-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #3a3a3a;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .conn-text {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #8a8a8a;
    text-transform: uppercase;
    font-weight: 600;
    display: none;
  }
  body.conn-live .conn-dot {
    background: #5DCAA5;
    box-shadow: 0 0 6px rgba(93,202,165,0.6);
  }
  body.conn-reconnecting .conn-dot {
    background: #6a6a6a;
    animation: conn-pulse 1.4s ease-in-out infinite;
  }
  body.conn-reconnecting .conn-text { display: inline; }
  @keyframes conn-pulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }
  body.no-dot .conn-indicator { display: none; }
</style>
</head>
<body>

<div id="waiting">
  <div>◌ Waiting for live app…</div>
  <div class="hint">Open <b>hr_monitor.html</b> in the same browser and connect the strap.</div>
</div>

<div id="overlay-zone">
  <!-- Reserved warning slot for warningPlacement === 'above'. Invisible until
       a warning fires; the widget below never changes height. -->
  <div class="warning-slot-above" id="warning-slot-above">
    <div class="warning-banner" id="warning-banner-above">
      <span class="warning-banner-icon" id="warning-icon-above"></span>
      <span class="warning-banner-text" id="warning-text-above"></span>
    </div>
  </div>
  <div class="widget-row">
    <div class="widget stage-normal" id="hr-widget">
      <div class="widget-header">
        <div class="header-left">
          <svg class="heart-icon" id="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          <span class="widget-label">BPM</span>
          <span class="palp-chip" id="palp-chip"><span class="palp-dot"></span><span id="palp-count">0</span></span>
        </div>
        <div class="warning-banner" id="warning-banner">
          <span class="warning-banner-icon" id="warning-icon"></span>
          <span class="warning-banner-text" id="warning-text"></span>
        </div>
      </div>
      <div class="number-row">
        <div class="big-number" id="hr-big">—</div>
        <div class="inline-live-trace"><canvas id="hr-live-trace"></canvas></div>
      </div>
      <div class="pips" id="hr-pips"><div class="pip"></div><div class="pip"></div><div class="pip"></div><div class="pip"></div><div class="pip"></div></div>
      <div class="compact-hrv" id="compact-hrv">
        <div class="compact-hrv-label">HRV</div>
        <div class="compact-hrv-value" id="compact-hrv-value">—</div>
        <div class="compact-hrv-unit">ms rmssd</div>
      </div>
      <div class="compact-trend"><canvas id="compact-chart"></canvas></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const bg = params.get('bg') || 'transparent';
  const hideHr = params.get('hide_hr') === '1';
  const hideHrv = params.get('hide_hrv') === '1';
  const hideLiveHr = params.get('hide_live_hr') === '1';
  const hideInline = params.get('hide_inline') === '1';

  document.body.classList.add('bg-' + bg);
  if (hideHr) document.body.classList.add('no-hr');
  if (hideHrv) document.body.classList.add('no-hrv');
  if (hideLiveHr) document.body.classList.add('no-live-hr');
  if (hideInline) document.body.classList.add('no-inline-trends');
  if (params.get('nodot') === '1') document.body.classList.add('no-dot');

  // OBS auto-refresh on deploy. OBS's embedded Chromium caches aggressively so
  // overlay updates normally require a manual "Refresh cache" click. Instead
  // we poll the overlay's own ETag every 5 minutes; when it changes we hard-reload.
  if (params.get('autoreload') !== '0') {
    let lastETag = null;
    async function checkForOverlayUpdate() {
      try {
        const resp = await fetch(location.pathname, { method: 'HEAD', cache: 'no-store' });
        const et = resp.headers.get('etag') || resp.headers.get('last-modified');
        if (et && lastETag && et !== lastETag) {
          const url = new URL(location.href);
          url.searchParams.set('_v', Date.now().toString());
          location.replace(url.toString());
          return;
        }
        if (et) lastETag = et;
      } catch (e) { /* network blip — try again next tick */ }
    }
    setTimeout(checkForOverlayUpdate, 30 * 1000);
    setInterval(checkForOverlayUpdate, 5 * 60 * 1000);
  }

  const STAGE_COLORS = {
    'stage-low':      '#7DB8E8',
    'stage-normal':   '#B8D97E',
    'stage-elevated': '#F0C75E',
    'stage-high':     '#E89858',
    'stage-critical': '#E24B4A',
  };
  function applyStage(el, stage) {
    el.classList.remove('stage-low', 'stage-normal', 'stage-elevated', 'stage-high', 'stage-critical');
    el.classList.add(stage || 'stage-normal');
  }
  function setPips(container, stage) {
    const stageIndex = { 'stage-low': 1, 'stage-normal': 2, 'stage-elevated': 3, 'stage-high': 4, 'stage-critical': 5 }[stage] || 2;
    container.querySelectorAll('.pip').forEach((p, i) => p.classList.toggle('active', i < stageIndex));
  }

  const WARN_ICONS = {
    'warn-high':  '<svg viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"></polyline><polyline points="17 17 12 12 7 17"></polyline></svg>',
    'warn-low':   '<svg viewBox="0 0 24 24"><polyline points="7 13 12 18 17 13"></polyline><polyline points="7 7 12 12 17 7"></polyline></svg>',
    'warn-crash': '<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>',
    'warn-palp':  '<svg viewBox="0 0 24 24"><path d="M3 12h4l2-8 4 16 2-8h6"></path></svg>',
    'status-reconnecting': '<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 3 21 9 15 9"/></svg>',
  };
  const WARN_TEXT = {
    'warn-high':  'Heart rate high',
    'warn-low':   'Heart rate low',
    'warn-crash': 'HRV crashed',
    'warn-palp':  'Palpitations elevated',
    'status-reconnecting': 'Reconnecting…',
  };
  function applyStatusBanner(warnType, connState) {
    let effectiveType = null;
    if (connState === 'reconnecting') effectiveType = 'status-reconnecting';
    else if (connState === 'live') effectiveType = warnType;
    const banners = [['warning-banner', 'warning-icon', 'warning-text'],
                     ['warning-banner-above', 'warning-icon-above', 'warning-text-above']];
    for (const [bId, iId, tId] of banners) {
      const banner = $(bId);
      if (!banner) continue;
      banner.classList.remove('warn-high', 'warn-low', 'warn-crash', 'warn-palp', 'status-reconnecting', 'active');
      if (effectiveType && WARN_TEXT[effectiveType]) {
        banner.classList.add(effectiveType, 'active');
        const ic = $(iId); if (ic) ic.innerHTML = WARN_ICONS[effectiveType] || '';
        const tx = $(tId); if (tx) tx.textContent = WARN_TEXT[effectiveType] || '';
      }
    }
  }

  // Apply widget-layout prefs received in a tick so the OBS overlay matches
  // whatever the live monitor is showing — no cache refresh needed.
  let lastPrefsFingerprint = '';
  function applyRemotePrefs(msg) {
    if (!msg) return;
    const z = $('overlay-zone');
    const prefs = msg.prefs || null;
    const size = msg.widgetSize || null;
    const fp = JSON.stringify({ prefs, size });
    if (fp === lastPrefsFingerprint) return;
    lastPrefsFingerprint = fp;
    if (prefs) {
      document.body.classList.toggle('no-hr', !prefs.showHr);
      document.body.classList.toggle('no-hrv', !prefs.showHrv);
      document.body.classList.toggle('no-live-hr', !prefs.showLiveHr);
      document.body.classList.toggle('no-inline-trends', !prefs.showInlineTrends);
      document.body.classList.toggle('no-palp-chip', prefs.showPalpChip === false);
      document.body.classList.toggle('no-warning', prefs.showWarning === false);
      document.body.classList.toggle('no-conn-dot', prefs.showConnDot === false);
      document.body.classList.toggle('warning-above', prefs.warningPlacement === 'above');
    }
    // Pin the overlay box to the monitor's measured dimensions so the OBS
    // source renders at the exact same size the preview shows.
    if (size && z && Number.isFinite(size.w) && Number.isFinite(size.h)) {
      z.style.width = size.w + 'px';
      z.style.height = size.h + 'px';
      z.style.overflow = 'hidden';
    }
  }

  function hexToRgba(hex, alpha) {
    const n = parseInt(hex.slice(1), 16);
    return 'rgba(' + ((n >> 16) & 0xff) + ',' + ((n >> 8) & 0xff) + ',' + (n & 0xff) + ',' + alpha + ')';
  }
  function tintChart(chart, color) {
    if (!chart || !color) return;
    const ds = chart.data.datasets[0];
    ds.borderColor = color;
    try {
      const ctx = chart.ctx;
      const g = ctx.createLinearGradient(0, 0, 0, chart.height || 100);
      g.addColorStop(0, hexToRgba(color, 0.3));
      g.addColorStop(1, hexToRgba(color, 0));
      ds.backgroundColor = g;
    } catch (e) {
      ds.backgroundColor = hexToRgba(color, 0.12);
    }
  }

  // Charts. Configs kept in lockstep with hr_monitor.html: monotone
  // interpolation and borderWidth 1.75 prevent the line from overshooting its
  // vertical bounds (otherwise the trace bleeds into the pips row below).
  const baseOpts = {
    responsive: true, maintainAspectRatio: false, animation: false,
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    scales: { x: { type: 'linear', display: false }, y: { display: false, grace: '8%' } },
  };
  const hrLiveTrace = new Chart($('hr-live-trace').getContext('2d'), {
    type: 'line',
    data: { datasets: [{ data: [], borderColor: '#B8D97E', backgroundColor: 'rgba(184,217,126,0.12)', tension: 0, cubicInterpolationMode: 'monotone', pointRadius: 0, borderWidth: 1.75, fill: true }] },
    options: { ...baseOpts, scales: { x: { type: 'linear', display: false, min: 0, max: 45 }, y: { display: false, grace: '12%' } } },
  });
  const compactTrend = new Chart($('compact-chart').getContext('2d'), {
    type: 'line',
    data: { datasets: [
      { label: 'HR', data: [], borderColor: '#E89858', backgroundColor: 'transparent', yAxisID: 'y', tension: 0.4, pointRadius: 0, borderWidth: 1.5 },
      { label: 'RMSSD', data: [], borderColor: '#d8d8d8', backgroundColor: 'transparent', yAxisID: 'y1', tension: 0.4, pointRadius: 0, borderWidth: 1.3, borderDash: [3, 3] },
    ] },
    options: {
      responsive: true, maintainAspectRatio: false, animation: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { type: 'linear', display: false },
        y: { display: false },
        y1: { position: 'right', display: false },
      },
    },
  });

  const broadcastKey = params.get('key');
  const RELAY_HOST = 'wss://hr-relay.nakauri.partykit.dev';

  function setConnState(state) {
    document.body.classList.remove('conn-live', 'conn-reconnecting');
    if (state === 'live') document.body.classList.add('conn-live');
    else if (state === 'reconnecting') document.body.classList.add('conn-reconnecting');
  }

  function handleTick(msg) {
    if (!msg || msg.type !== 'tick') return;
    lastTick = Date.now();
    document.body.classList.add('connected');
    setConnState('live');
    try { applyRemotePrefs(msg); } catch (e) { console.warn('applyRemotePrefs failed:', e); }

    $('hr-big').textContent = msg.hr != null ? msg.hr : '—';
    $('compact-hrv-value').textContent = msg.rmssd != null ? Math.round(msg.rmssd) : '—';
    applyStage($('hr-widget'), msg.hrStage);
    // HRV readout inside the HR widget isn't reached by the stage class on
    // the widget; apply directly so HRV numbers colourize with RMSSD stage.
    applyStage($('compact-hrv-value'), msg.rmssdStage);
    setPips($('hr-pips'), msg.hrStage);

    const hrColor = STAGE_COLORS[msg.hrStage || 'stage-normal'];
    tintChart(hrLiveTrace, hrColor);
    if (compactTrend && compactTrend.data.datasets[0]) {
      compactTrend.data.datasets[0].borderColor = hrColor;
    }

    const palpChip = $('palp-chip');
    if (msg.palpPerMin > 0) {
      palpChip.classList.add('active');
      $('palp-count').textContent = msg.palpPerMin;
    } else {
      palpChip.classList.remove('active');
    }
    applyStatusBanner(msg.warn, msg.conn || 'live');

    if (msg.livePoints) {
      hrLiveTrace.data.datasets[0].data = msg.livePoints;
      hrLiveTrace.options.scales.x.min = msg.liveWindow ? msg.liveWindow[0] : 0;
      hrLiveTrace.options.scales.x.max = msg.liveWindow ? msg.liveWindow[1] : 45;
      try { hrLiveTrace.update('none'); } catch(e) {}
    }
    if (msg.trendHR && msg.trendRmssd) {
      compactTrend.data.datasets[0].data = msg.trendHR;
      compactTrend.data.datasets[1].data = msg.trendRmssd;
      try { compactTrend.update('none'); } catch(e) {}
    }
  }

  let lastTick = 0;

  // Same-browser path (overlay popup opened from the monitor tab)
  const channel = new BroadcastChannel('hr-monitor-broadcast');
  channel.addEventListener('message', (ev) => handleTick(ev.data));
  channel.postMessage({ type: 'request-snapshot' });

  // Cross-browser path via relay (OBS Browser Source)
  if (broadcastKey) {
    let ws = null;
    function connect() {
      ws = new WebSocket(RELAY_HOST + '/parties/main/' + broadcastKey);
      ws.addEventListener('message', (ev) => {
        try { handleTick(JSON.parse(ev.data)); } catch (e) {}
      });
      ws.addEventListener('close', () => {
        ws = null;
        setTimeout(connect, 5000);
      });
    }
    connect();
  }

  // Flip to reconnecting after 3 s of tick silence so the overlay can show
  // the reconnecting banner even if the monitor hasn't reported conn state.
  setInterval(() => {
    if (lastTick === 0) return;
    const silent = Date.now() - lastTick;
    if (silent > 15000) {
      document.body.classList.remove('connected');
      applyStatusBanner(null, 'reconnecting');
    } else if (silent > 3000) {
      applyStatusBanner(null, 'reconnecting');
    }
  }, 1500);
})();
</script>
</body>
</html>
