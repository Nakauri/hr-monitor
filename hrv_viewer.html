  // ===== Headline metric selector (Month + Week) =====
  // POTS-friendly metrics — flat "avg HR" mixes lying + standing HR which is
  // meaningless. Swap between resting baseline (calmest 5-min window), tachycardia
  // burden (% time HR > 100), HR range (max-min reactivity), and plain average.
  let headlineMetric = localStorage.getItem('hrv_viewer_headline_metric') || 'rest';

  // Aggregate a metric across a day's sessions. Returns { value, label, unit, stage, color }
  function computeHeadline(metric, files) {
    if (!files || !files.length) return { value: null, label: '', unit: '', stage: 'stage-normal', color: STAGE_COLORS['stage-normal'] };
    let totalDur = 0, weightedHR = 0, weightedTachy = 0, minRest = null, maxHR = null, minHR = null;
    for (const fn of files) {
      const s = sessionsIndex[fn];
      if (!s) continue;
      totalDur += s.duration;
      weightedHR += s.hrAvg * s.duration;
      weightedTachy += (s.tachyPct || 0) * s.duration;
      if (s.restingHR != null && (minRest == null || s.restingHR < minRest)) minRest = s.restingHR;
      if (s.hrMax && (maxHR == null || s.hrMax.v > maxHR)) maxHR = s.hrMax.v;
      if (s.hrMin && (minHR == null || s.hrMin.v < minHR)) minHR = s.hrMin.v;
    }
    if (totalDur === 0) return { value: null, label: '', unit: '', stage: 'stage-normal', color: STAGE_COLORS['stage-normal'] };
    if (metric === 'avg') {
      const v = Math.round(weightedHR / totalDur);
      const stage = getHRStage(v);
      return { value: v, label: 'Avg HR', unit: 'bpm', stage, color: STAGE_COLORS[stage] };
    }
    if (metric === 'rest') {
      const stage = getHRStage(minRest);
      return { value: minRest, label: 'Resting', unit: 'bpm', stage, color: STAGE_COLORS[stage] };
    }
    if (metric === 'tachy') {
      const v = Math.round(weightedTachy / totalDur);
      // Tachy burden color bands: <10 green, <20 yellow, <40 orange, ≥40 red
      let stage = 'stage-low', color;
      if (v < 10) { stage = 'stage-normal'; color = STAGE_COLORS['stage-normal']; }
      else if (v < 20) { stage = 'stage-elevated'; color = STAGE_COLORS['stage-elevated']; }
      else if (v < 40) { stage = 'stage-high'; color = STAGE_COLORS['stage-high']; }
      else { stage = 'stage-critical'; color = STAGE_COLORS['stage-critical']; }
      return { value: v, label: 'Tachy', unit: '%', stage, color };
    }
    if (metric === 'range') {
      const v = (maxHR != null && minHR != null) ? (maxHR - minHR) : null;
      // HR range color bands: <20 good, <35 ok, <55 concerning, ≥55 POTS-flare-likely
      let color = STAGE_COLORS['stage-normal'];
      if (v == null) color = STAGE_COLORS['stage-normal'];
      else if (v < 20) color = STAGE_COLORS['stage-normal'];
      else if (v < 35) color = STAGE_COLORS['stage-elevated'];
      else if (v < 55) color = STAGE_COLORS['stage-high'];
      else color = STAGE_COLORS['stage-critical'];
      return { value: v, label: 'HR Range', unit: 'Δbpm', stage: 'stage-normal', color };
    }
    return { value: null, label: '', unit: '', stage: 'stage-normal', color: STAGE_COLORS['stage-normal'] };
  }

  function metricSwitchHTML() {
    const metrics = [
      ['rest', 'Rest'],
      ['avg', 'Avg'],
      ['tachy', 'Tachy %'],
      ['range', 'Range'],
    ];
    return `<div class="metric-switch">${metrics.map(([k, lbl]) =>
      `<button data-metric="${k}" class="${headlineMetric === k ? 'active' : ''}">${lbl}</button>`
    ).join('')}</div>`;
  }

  function wireMetricSwitch(container, onChange) {
    container.querySelectorAll('.metric-switch button').forEach(btn => {
      btn.addEventListener('click', () => {
        headlineMetric = btn.dataset.metric;
        try { localStorage.setItem('hrv_viewer_headline_metric', headlineMetric); } catch (e) {}
        onChange();
      });
    });
  }

  // ===== Month calendar =====
  function renderMonth(ymArg) {
    const el = document.getElementById('view-month');
    // Default to the month of the newest session, else today
    let year, month;
    if (/^\d{4}-\d{2}$/.test(ymArg || '')) {
      [year, month] = ymArg.split('-').map(Number);
      month -= 1;
    } else {
      const dates = Object.keys(sessionsByDate).sort();
      const pick = dates.length ? new Date(dates[dates.length - 1] + 'T00:00:00') : new Date();
      year = pick.getFullYear();
      month = pick.getMonth();
    }
    const first = new Date(year, month, 1);
    const monthName = first.toLocaleString(undefined, { month: 'long', year: 'numeric' });
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const dowStart = first.getDay(); // 0=Sun
    const todayStr = new Date().toISOString().slice(0, 10);

    // Compute bounds for color scaling: use each day's morning HR across ALL sessions.
    // We color with the stage colors (same vocabulary as live app).
    const dayStats = {}; // 'YYYY-MM-DD' -> { avgHR, restingHR, ... }
    for (const [dateStr, files] of Object.entries(sessionsByDate)) {
      let weightedHR = 0, totalDur = 0, lowestRest = null;
      let palp = 0, warn = 0, flush = 0, chills = 0;
      for (const fn of files) {
        const ss = sessionsIndex[fn];
        if (!ss) continue;
        weightedHR += ss.hrAvg * ss.duration;
        totalDur += ss.duration;
        if (ss.restingHR != null && (lowestRest == null || ss.restingHR < lowestRest)) lowestRest = ss.restingHR;
        palp += ss.palpCount;
        warn += ss.warnCount;
        flush += (ss.flushes || []).length;
        chills += (ss.chillsWindows || []).length;
      }
      const avgHR = totalDur > 0 ? Math.round(weightedHR / totalDur) : null;
      dayStats[dateStr] = { avgHR, restingHR: lowestRest, sessionCount: files.length, palpCount: palp, warnCount: warn, flushCount: flush, chillsCount: chills, firstFile: files[0] };
    }

    const dowNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    let cells = '';
    for (const d of dowNames) cells += `<div class="cal-dow">${d}</div>`;
    // Pad leading empty days
    for (let i = 0; i < dowStart; i++) cells += `<div class="cal-cell empty-month"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const iso = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const stats = dayStats[iso];
      const isToday = iso === todayStr;
      if (!stats) {
        cells += `<div class="cal-cell ${isToday ? 'today' : ''}"><div class="cal-day-num">${d}</div></div>`;
        continue;
      }
      const headline = computeHeadline(headlineMetric, sessionsByDate[iso]);
      const palpBadge = stats.palpCount > 0 ? `<span class="cal-badge palp" title="${stats.palpCount} palpitation beats"><span class="cal-badge-dot"></span>${stats.palpCount}</span>` : '';
      const warnBadge = stats.warnCount > 0 ? `<span class="cal-badge warn" title="${stats.warnCount} threshold warnings"><span class="cal-badge-dot"></span>${stats.warnCount}</span>` : '';
      const flushBadge = stats.flushCount > 0 ? `<span class="cal-badge flush" title="${stats.flushCount} sympathetic flush events"><span class="cal-badge-dot"></span>${stats.flushCount}</span>` : '';
      const chillsBadge = stats.chillsCount > 0 ? `<span class="cal-badge chills" title="${stats.chillsCount} chills / volatility windows"><span class="cal-badge-dot"></span>${stats.chillsCount}</span>` : '';
      cells += `
        <div class="cal-cell has-sessions ${isToday ? 'today' : ''}" data-date="${iso}" style="border-left: 4px solid ${headline.color};">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="cal-day-num">${d}</span>
            <span class="cal-session-count">${stats.sessionCount} session${stats.sessionCount === 1 ? '' : 's'}</span>
          </div>
          <div>
            <div class="cal-hr" style="color: ${headline.color};">${headline.value ?? '—'}${headline.unit === '%' ? '<span style="font-size: 16px;">%</span>' : ''}</div>
            <div class="cal-hr-unit">${headline.label}${headlineMetric === 'rest' && stats.avgHR != null ? ` · avg ${stats.avgHR}` : ''}</div>
          </div>
          <div class="cal-badges">${palpBadge}${warnBadge}${flushBadge}${chillsBadge}</div>
        </div>`;
    }

    // Legend for cell colors
    const legend = `
      <div class="cal-legend-strip">
        <div class="chart-legend-item"><span class="legend-swatch" style="background: #7DB8E8;"></span>Low</div>
        <div class="chart-legend-item"><span class="legend-swatch" style="background: #B8D97E;"></span>Normal</div>
        <div class="chart-legend-item"><span class="legend-swatch" style="background: #F0C75E;"></span>Elevated</div>
        <div class="chart-legend-item"><span class="legend-swatch" style="background: #E89858;"></span>High</div>
        <div class="chart-legend-item"><span class="legend-swatch" style="background: #E24B4A;"></span>Critical</div>
      </div>`;

    el.innerHTML = `
      <div class="cal-header">
        <div class="cal-title">${monthName}</div>
        <div class="cal-nav">
          <button id="cal-prev" title="Previous month">&larr;</button>
          <button id="cal-next" title="Next month">&rarr;</button>
        </div>
        <button class="cal-today-btn" id="cal-today">Today</button>
        ${metricSwitchHTML()}
        ${legend}
      </div>
      <div class="cal-grid">${cells}</div>
    `;

    wireMetricSwitch(el, () => renderMonth(ymArg));

    // Nav handlers
    document.getElementById('cal-prev').addEventListener('click', () => {
      const d = new Date(year, month - 1, 1);
      setHash(`month/${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
    });
    document.getElementById('cal-next').addEventListener('click', () => {
      const d = new Date(year, month + 1, 1);
      setHash(`month/${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
    });
    document.getElementById('cal-today').addEventListener('click', () => {
      const n = new Date();
      setHash(`month/${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, '0')}`);
    });

    // Cell click → day view (stub for now) or jump to first session of that day
    el.querySelectorAll('.cal-cell.has-sessions').forEach(cell => {
      cell.addEventListener('click', () => {
        const date = cell.dataset.date;
        const files = sessionsByDate[date] || [];
        // If only one session, open it directly; else go to day view
        if (files.length === 1) {
          setHash('session/' + encodeURIComponent(files[0]));
        } else {
          setHash('day/' + date);
        }
      });
    });
  }

  // ===== Day view: single date, 24-hr strip + session cards =====
  function renderDay(dateArg) {
    const el = document.getElementById('view-day');
    let iso = /^\d{4}-\d{2}-\d{2}$/.test(dateArg || '') ? dateArg : null;
    if (!iso) {
      const dates = Object.keys(sessionsByDate).sort();
      iso = dates.length ? dates[dates.length - 1] : new Date().toISOString().slice(0, 10);
    }
    const date = new Date(iso + 'T00:00:00');
    const title = date.toLocaleString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const files = sessionsByDate[iso] || [];

    // Strip blocks per session, scaled to 24 hours
    const blocksHtml = files.map(fn => {
      const s = sessionsIndex[fn];
      const meta = parseSessionFilename(fn);
      if (!s || !meta) return '';
      const startHr = meta.date.getHours() + meta.date.getMinutes() / 60 + meta.date.getSeconds() / 3600;
      const durHr = s.duration / 60;
      const left = (startHr / 24) * 100;
      const width = Math.max(0.3, (durHr / 24) * 100);
      const stage = getHRStage(s.hrAvg);
      const color = STAGE_COLORS[stage];
      const tip = `${meta.isoTime} · ${formatDuration(s.duration)} · avg HR ${s.hrAvg}${s.rmssdAvg != null ? ` · HRV ${s.rmssdAvg}` : ''}${s.palpCount ? ` · ${s.palpCount} palp` : ''}`;
      return `<div class="day-strip-block" data-filename="${encodeURIComponent(fn)}" data-tip="${escape(tip)}" style="left: ${left}%; width: ${width}%; background: ${color};"></div>`;
    }).join('');

    // Hour axis (every 3 hours labeled, gridlines every hour)
    let axisHtml = '';
    let gridHtml = '';
    for (let h = 0; h <= 24; h++) {
      const pct = (h / 24) * 100;
      if (h % 3 === 0) axisHtml += `<div class="day-hour-tick" style="left: ${pct}%;">${String(h).padStart(2, '0')}:00</div>`;
      if (h > 0 && h < 24) gridHtml += `<div class="day-hour-gridline" style="left: ${pct}%;"></div>`;
    }

    const sessionCardsHtml = files.length ? files.map(fn => {
      const s = sessionsIndex[fn];
      const meta = parseSessionFilename(fn);
      const hrStage = getHRStage(s.hrAvg);
      return `
        <div class="session-card" data-filename="${encodeURIComponent(fn)}">
          <div class="session-card-time">${meta ? meta.isoTime : fn}</div>
          <div class="session-card-date">${formatDuration(s.duration)} session</div>
          <div class="session-card-stats">
            <div class="session-card-stat"><span class="session-card-stat-label">Avg HR</span><span class="session-card-stat-value ${hrStage}">${s.hrAvg}</span></div>
            <div class="session-card-stat"><span class="session-card-stat-label">Avg HRV</span><span class="session-card-stat-value" style="color: var(--accent-rmssd);">${s.rmssdAvg ?? '—'}</span></div>
            <div class="session-card-stat"><span class="session-card-stat-label">Palps</span><span class="session-card-stat-value" style="color: ${s.palpCount ? 'var(--warn-palp)' : 'var(--text-faint)'};">${s.palpCount}</span></div>
            <div class="session-card-stat"><span class="session-card-stat-label">Shifts</span><span class="session-card-stat-value" style="color: ${s.hrDeltas && s.hrDeltas.length ? '#8BB4FF' : 'var(--text-faint)'};">${(s.hrDeltas || []).length}</span></div>
            <div class="session-card-stat"><span class="session-card-stat-label">Flush</span><span class="session-card-stat-value" style="color: ${s.flushes && s.flushes.length ? '#E8A858' : 'var(--text-faint)'};">${(s.flushes || []).length}</span></div>
            <div class="session-card-stat"><span class="session-card-stat-label">Chills</span><span class="session-card-stat-value" style="color: ${s.chillsWindows && s.chillsWindows.length ? '#85B7EB' : 'var(--text-faint)'};">${(s.chillsWindows || []).length}</span></div>
          </div>
        </div>`;
    }).join('') : `<div class="stub-panel">No sessions on this date.</div>`;

    // Prev/next day navigation. Only allow dates where there's actual data
    // so you don't walk forever through empty days.
    const dateKeys = Object.keys(sessionsByDate).sort();
    const idxInDates = dateKeys.indexOf(iso);
    const prevDate = idxInDates > 0 ? dateKeys[idxInDates - 1] : (dateKeys.length ? dateKeys[dateKeys.length - 1] : iso);
    const nextDate = idxInDates >= 0 && idxInDates < dateKeys.length - 1 ? dateKeys[idxInDates + 1] : (dateKeys.length ? dateKeys[0] : iso);
    const [year, month] = iso.split('-');

    el.innerHTML = `
      <div class="day-header">
        <a class="back-link" href="#/month/${year}-${month}" style="margin: 0;">← ${date.toLocaleString(undefined, { month: 'long', year: 'numeric' })}</a>
        <div class="day-title">${title}</div>
        <div class="cal-nav">
          <button id="day-prev" title="Previous day with data">&larr;</button>
          <button id="day-next" title="Next day with data">&rarr;</button>
        </div>
        <div style="margin-left: auto; color: var(--text-dim); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;">${files.length} session${files.length === 1 ? '' : 's'}</div>
      </div>

      <div class="day-strip-panel">
        <div class="day-strip-label">24-hour timeline · click a block to open the session</div>
        <div class="day-strip" id="day-strip">
          ${gridHtml}
          ${blocksHtml}
          ${files.length ? '' : '<div class="day-strip-empty">No sessions recorded on this day.</div>'}
        </div>
        <div class="day-hour-axis">${axisHtml}</div>
      </div>

      <div class="section-head">Sessions</div>
      <div class="sessions-grid">${sessionCardsHtml}</div>
    `;

    // Wire prev/next. If there's only one date with data, just stay.
    document.getElementById('day-prev').addEventListener('click', () => setHash('day/' + prevDate));
    document.getElementById('day-next').addEventListener('click', () => setHash('day/' + nextDate));

    // Click handlers: strip blocks + session cards both open the session view
    el.querySelectorAll('.day-strip-block').forEach(b => {
      b.addEventListener('click', () => setHash('session/' + b.dataset.filename));
      b.addEventListener('mouseenter', (e) => showAnnoTip(b.dataset.tip.replace(/·/g, '<br/>'), e));
      b.addEventListener('mouseleave', hideAnnoTip);
    });
    el.querySelectorAll('.session-card').forEach(c => {
      c.addEventListener('click', () => setHash('session/' + c.dataset.filename));
    });
  }

  // ===== Week view =====
  function renderWeek(weekArg) {
    const el = document.getElementById('view-week');
    // Resolve the week's Monday (ISO-ish — treat Sunday as start-of-week to match Month)
    let anchor;
    if (/^\d{4}-\d{2}-\d{2}$/.test(weekArg || '')) {
      anchor = new Date(weekArg + 'T00:00:00');
    } else {
      const dates = Object.keys(sessionsByDate).sort();
      anchor = dates.length ? new Date(dates[dates.length - 1] + 'T00:00:00') : new Date();
    }
    // Back up to Sunday of that week
    const weekStart = new Date(anchor);
    weekStart.setDate(anchor.getDate() - anchor.getDay());
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);

    const todayStr = new Date().toISOString().slice(0, 10);
    const weekStartStr = weekStart.toISOString().slice(0, 10);
    const weekEndStr = weekEnd.toISOString().slice(0, 10);
    const dowNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    const cols = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      const iso = d.toISOString().slice(0, 10);
      const files = sessionsByDate[iso] || [];
      // Duration-weighted avg HR across the day's sessions — more representative than
      // picking one session's average or using morning-only resting HR.
      let weightedHR = 0, totalDur = 0, totalPalp = 0, totalWarn = 0, totalShifts = 0, totalFlush = 0, totalChills = 0;
      for (const fn of files) {
        const s = sessionsIndex[fn];
        if (!s) continue;
        weightedHR += s.hrAvg * s.duration;
        totalDur += s.duration;
        totalPalp += s.palpCount;
        totalWarn += s.warnCount;
        totalShifts += (s.hrDeltas || []).length;
        totalFlush += (s.flushes || []).length;
        totalChills += (s.chillsWindows || []).length;
      }
      const avgHR = totalDur > 0 ? Math.round(weightedHR / totalDur) : null;
      cols.push({ iso, date: d, dow: dowNames[i], files, avgHR, totalPalp, totalWarn, totalShifts, totalFlush, totalChills, totalDur });
    }

    const weekTitle = `Week of ${weekStart.toLocaleString(undefined, { month: 'short', day: 'numeric' })} – ${weekEnd.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })}`;

    el.innerHTML = `
      <div class="cal-header">
        <div class="cal-title">${weekTitle}</div>
        <div class="cal-nav">
          <button id="week-prev" title="Previous week">&larr;</button>
          <button id="week-next" title="Next week">&rarr;</button>
        </div>
        <button class="cal-today-btn" id="week-today">This week</button>
        ${metricSwitchHTML()}
        <div class="cal-legend-strip">
          <div class="chart-legend-item"><span class="legend-swatch" style="background: #7DB8E8;"></span>Low</div>
          <div class="chart-legend-item"><span class="legend-swatch" style="background: #B8D97E;"></span>Normal</div>
          <div class="chart-legend-item"><span class="legend-swatch" style="background: #F0C75E;"></span>Elevated</div>
          <div class="chart-legend-item"><span class="legend-swatch" style="background: #E89858;"></span>High</div>
          <div class="chart-legend-item"><span class="legend-swatch" style="background: #E24B4A;"></span>Critical</div>
        </div>
      </div>
      <div class="week-grid">
        ${cols.map(c => {
          const hasData = c.files.length > 0;
          const headline = computeHeadline(headlineMetric, c.files);
          const isToday = c.iso === todayStr;
          return `
            <div class="week-col ${hasData ? 'has-sessions' : 'empty'} ${isToday ? 'today' : ''}" data-date="${c.iso}" style="${hasData ? `border-left: 4px solid ${headline.color};` : ''}">
              <div class="week-col-head">
                <span class="week-dow">${c.dow}</span>
                <span class="week-date">${c.date.getDate()}</span>
              </div>
              ${hasData ? `
                <div>
                  <div class="week-col-hr" style="color: ${headline.color};">${headline.value ?? '—'}${headline.unit === '%' ? '<span style="font-size: 14px;">%</span>' : ''}</div>

                </div>

                  <div class="week-col-stat"><span class="week-col-stat-label">Sess</span><span>${c.files.length}</span></div>
                  <div class="week-col-stat"><span class="week-col-stat-label">Palp</span><span style="color: ${c.totalPalp ? 'var(--warn-palp)' : 'var(--text-dim)'};">${c.totalPalp}</span></div>
                  <div class="week-col-stat"><span class="week-col-stat-label">Flush</span><span style="color: ${c.totalFlush ? '#E8A858' : 'var(--text-dim)'};">${c.totalFlush}</span></div>
                  <div class="week-col-stat"><span class="week-col-stat-label">Chill</span><span style="color: ${c.totalChills ? '#85B7EB' : 'var(--text-dim)'};">${c.totalChills}</span></div>
                </div>
              ` : `<div style="font-size: 11px; color: var(--text-faint); font-style: italic; margin-top: 12px;">no sessions</div>`}
            </div>`;
        }).join('')}
      </div>
    `;

    wireMetricSwitch(el, () => renderWeek(weekArg));

    // Wire nav
    const dayMs = 86400000;
    document.getElementById('week-prev').addEventListener('click', () => {
      const d = new Date(weekStart.getTime() - 7 * dayMs);
      setHash('week/' + d.toISOString().slice(0, 10));
    });
    document.getElementById('week-next').addEventListener('click', () => {
      const d = new Date(weekStart.getTime() + 7 * dayMs);
      setHash('week/' + d.toISOString().slice(0, 10));

    document.getElementById('week-today').addEventListener('click', () => {
      setHash('week/' + todayStr);

    el.querySelectorAll('.week-col.has-sessions').forEach(col => {
      col.addEventListener('click', () => {
        const files = sessionsByDate[col.dataset.date] || [];
        if (files.length === 1) setHash('session/' + encodeURIComponent(files[0]));
        else setHash('day/' + col.dataset.date);

    // Sparklines: mini HR trace per day, aggregated across sessions
    for (const col of cols) {
      if (!col.files.length) continue;
      const canvas = el.querySelector(`canvas[data-spark="${col.iso}"]`);
      if (!canvas) continue;
      drawDaySparkline(canvas, col.files, col.morningHR);
    }
  }

  async function drawDaySparkline(canvas, files, morningHR) {
    // Build a single-day 24-hr HR trace by stitching all sessions' HR series
    // (downsampled) on a shared 24-hr x-axis. Fast-read only - uses cached summaries
    // plus re-parses for HR data on demand.
    const points = [];
    for (const fn of files) {
      try {
        const fh = await dirHandle.getFileHandle(fn);
        const file = await fh.getFile();
        const text = await file.text();
        const meta = parseSessionFilename(fn);
        const startHr = meta.date.getHours() + meta.date.getMinutes() / 60;
        const { rows, header } = parseCSV(text);
        const idx = {};
        header.forEach((h, i) => idx[h.trim()] = i);
        // Downsample to ~30 points per session
        const stride = Math.max(1, Math.floor(rows.length / 30));
        for (let i = 0; i < rows.length; i += stride) {
          const t = parseFloat(rows[i][idx.time_min]);
          const h = parseFloat(rows[i][idx.hr_bpm]);
          if (!isNaN(t) && !isNaN(h)) points.push({ x: startHr + t / 60, y: h });
        }
      } catch (e) {}
    }
    points.sort((a, b) => a.x - b.x);
    const hrStage = getHRStage(morningHR);
    const color = STAGE_COLORS[hrStage];
    new Chart(canvas.getContext('2d'), {
      type: 'line',
      data: { datasets: [{ data: points, borderColor: color, backgroundColor: color + '20', tension: 0, pointRadius: 0, borderWidth: 1.2, fill: true }] },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: { x: { type: 'linear', min: 0, max: 24, display: false }, y: { display: false, grace: '10%' } },
      },
    });
  }

  // ===== All-time trends =====
  let allGranularity = 'day'; // 'session' | 'day' | 'week' | 'month'

  // Return a bucket key ('YYYY-MM-DD' etc.) for a session given the current granularity
  function bucketKey(meta, gran) {
    if (gran === 'session') return meta.isoDate + ' ' + meta.isoTime;
    if (gran === 'day') return meta.isoDate;
    if (gran === 'week') {
      const d = new Date(meta.date);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - d.getDay()); // Sunday
      return d.toISOString().slice(0, 10);
    }
    if (gran === 'month') return meta.isoDate.slice(0, 7);
    return meta.isoDate;
  }

  // Aggregate per-session values into buckets by granularity, choosing reducer per metric.
  function aggregateBuckets(allFilenames, gran, valueFn, reducer) {
    const buckets = new Map(); // key -> array of values
    for (const fn of allFilenames) {
      const s = sessionsIndex[fn]; const meta = parseSessionFilename(fn);
      if (!s || !meta) continue;
      const v = valueFn(s, meta);
      if (v == null) continue;
      const k = bucketKey(meta, gran);
      if (!buckets.has(k)) buckets.set(k, []);
      buckets.get(k).push(v);
    }
    const ordered = Array.from(buckets.keys()).sort();
    return ordered.map(k => ({ x: k, y: reducer(buckets.get(k)) }));
  }
  const reduceAvg = arr => Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
  const reduceSum = arr => arr.reduce((a, b) => a + b, 0);
  const reduceAvg1 = arr => +(arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1);

  function renderAll() {
    const el = document.getElementById('view-all');
    const allFilenames = Object.keys(sessionsIndex).sort();
    if (!allFilenames.length) {

    }

    const gran = allGranularity;
    // Aggregated datasets for charts
    const hrAvgAgg = aggregateBuckets(allFilenames, gran, s => s.hrAvg, reduceAvg);
    const restingHRAgg = aggregateBuckets(allFilenames, gran, s => s.restingHR, reduceAvg);
    const rmssdAgg = aggregateBuckets(allFilenames, gran, s => s.rmssdAvg, reduceAvg1);
    const warnAgg = aggregateBuckets(allFilenames, gran, s => s.warnCount, reduceSum);
    const sympAgg = aggregateBuckets(allFilenames, gran, s => (s.quadPct ? s.quadPct['high-low'] : null), reduceAvg);
    const flushAgg = aggregateBuckets(allFilenames, gran, s => (s.flushes || []).length, reduceSum);
    const chillsAgg = aggregateBuckets(allFilenames, gran, s => (s.chillsWindows || []).length, reduceSum);
    const palpClustAgg = aggregateBuckets(allFilenames, gran, s => (s.palpClusters || []).length, reduceSum);
    const shiftAgg = aggregateBuckets(allFilenames, gran, s => (s.hrDeltas || []).length, reduceSum);

    // Rolling RMSSD window scaled to granularity
    const rollWin = gran === 'session' ? 7 : gran === 'day' ? 7 : gran === 'week' ? 4 : 3;
    const rollRmssd = [];
    for (let i = 0; i < rmssdAgg.length; i++) {
      const start = Math.max(0, i - rollWin + 1);
      let sum = 0, n = 0;
      for (let j = start; j <= i; j++) { sum += rmssdAgg[j].y; n++; }
      rollRmssd.push({ x: rmssdAgg[i].x, y: +(sum / n).toFixed(1) });
    }

    // Palps by hour — always per-hour regardless of granularity (different dimension)
    const palpsByHour = new Array(24).fill(0);
    for (const fn of allFilenames) {
      const s = sessionsIndex[fn]; const meta = parseSessionFilename(fn);

    }

    // Align autonomic events to the same bucket keys for stacked bar
    const bucketKeysUnion = Array.from(new Set([...flushAgg.map(b => b.x), ...chillsAgg.map(b => b.x), ...palpClustAgg.map(b => b.x), ...shiftAgg.map(b => b.x)])).sort();
    const byKey = (arr) => Object.fromEntries(arr.map(b => [b.x, b.y]));
    const fMap = byKey(flushAgg), cMap = byKey(chillsAgg), pMap = byKey(palpClustAgg), sMap = byKey(shiftAgg);

    const granLabel = { session: 'Session', day: 'Day', week: 'Week', month: 'Month' }[gran];
    el.innerHTML = `

      type: 'line',

        { label: 'Resting HR', data: restingHRAgg, borderColor: '#85B7EB', backgroundColor: 'transparent', tension: 0, pointRadius: 2, borderWidth: 1.5, borderDash: [3, 3] },
      ] },

        responsive: true, maintainAspectRatio: false, animation: false,

        scales: {
          x: { type: 'category', ticks: { color: '#9a9a9a', font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#b0b0b0', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        },
      },
    });

    // Rolling RMSSD
    new Chart(document.getElementById('all-rmssd-roll').getContext('2d'), {
      type: 'line',
      data: { datasets: [
        { label: granLabel, data: rmssdAgg, borderColor: 'rgba(93,202,165,0.35)', backgroundColor: 'transparent', tension: 0, pointRadius: 1.5, borderWidth: 1 },
        { label: `${rollWin}-${granLabel.toLowerCase()} avg`, data: rollRmssd, borderColor: '#5DCAA5', backgroundColor: 'rgba(93,202,165,0.08)', tension: 0, pointRadius: 0, borderWidth: 2, fill: true },
      ] },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { labels: { color: '#b0b0b0', font: { size: 11 }, boxWidth: 12 } } },
        scales: {
          x: { type: 'category', ticks: { color: '#9a9a9a', font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 10 }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#5DCAA5', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        },
      },
    });

    // Warnings bar
    new Chart(document.getElementById('all-warn-bar').getContext('2d'), {
      type: 'bar',
      data: { labels: warnAgg.map(w => w.x), datasets: [{ label: 'Warnings', data: warnAgg.map(w => w.y), backgroundColor: warnAgg.map(w => w.y > 0 ? '#BA7517' : '#2a2a2a'), borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { display: false } },
        scales: {

          y: { ticks: { color: '#9a9a9a', font: { size: 11 }, stepSize: 1, precision: 0 }, grid: { color: 'rgba(255,255,255,0.04)' }, beginAtZero: true },
        },
      },
    });

    // Palpitations by hour of day (polar bar)
    new Chart(document.getElementById('all-palp-hour').getContext('2d'), {
      type: 'polarArea',

    // Autonomic events (stacked)

          { label: 'Chills', data: bucketKeysUnion.map(k => cMap[k] || 0), backgroundColor: '#85B7EB', borderWidth: 0 },
          { label: 'Palp clusters', data: bucketKeysUnion.map(k => pMap[k] || 0), backgroundColor: '#D76CBA', borderWidth: 0 },
          { label: 'HR shifts', data: bucketKeysUnion.map(k => sMap[k] || 0), backgroundColor: '#8BB4FF', borderWidth: 0 },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { labels: { color: '#b0b0b0', font: { size: 11 }, boxWidth: 12 } } },
        scales: {
          x: { stacked: true, ticks: { color: '#7a7a7a', font: { size: 9 }, maxRotation: 60, autoSkip: true, maxTicksLimit: 12 }, grid: { display: false } },
          y: { stacked: true, ticks: { color: '#9a9a9a', font: { size: 11 }, stepSize: 1, precision: 0 }, grid: { color: 'rgba(255,255,255,0.04)' }, beginAtZero: true },
        },
      },
    });
  }

  // ===== Session detail view =====
  let currentChart = null;
  let currentContextChart = null;
  let currentSummary = null;
  let currentData = null;
  let currentQuadRanges = null;
  let brushMin = null, brushMax = null;
  let activeFilters = { event: true, warning: true, palp: true, disconnect: true, delta: true, flush: true, chills: true, posture: true, sleep: true };
  let activeQuadrants = { 'low-high': false, 'high-high': false, 'low-low': false, 'high-low': false };

  // Walk through paired HR + RMSSD samples, classify each point into a quadrant,
  // and merge adjacent same-quadrant points into time ranges for chart overlays.
  function computeQuadrantRanges(data) {
    const out = { 'low-high': [], 'high-high': [], 'low-low': [], 'high-low': [] };
    if (!data.rmssd.length || !data.hr.length) return out;
    // Iterate RMSSD (coarser sampling) and find nearest HR value for each.
    let hrIdx = 0;
    const rr = data.rmssd;
    const hr = data.hr;
    const hrThresh = colorThresholds.normal;
    const rmThresh = 40;
    let cur = null;
    for (const p of rr) {
      // Advance hrIdx to the sample nearest in time
      while (hrIdx + 1 < hr.length && Math.abs(hr[hrIdx + 1].x - p.x) <= Math.abs(hr[hrIdx].x - p.x)) hrIdx++;
      const hrVal = hr[hrIdx].y;
      const hrHigh = hrVal >= hrThresh;
      const rmHigh = p.y >= rmThresh;
      let key;
      if (!hrHigh && rmHigh) key = 'low-high';
      else if (hrHigh && rmHigh) key = 'high-high';
      else if (!hrHigh && !rmHigh) key = 'low-low';
      else key = 'high-low';
      if (cur && cur.key === key && p.x - cur.end <= 0.5) {
        cur.end = p.x;
      } else {
        if (cur) out[cur.key].push({ start: cur.start, end: cur.end });
        cur = { key, start: p.x, end: p.x };
      }
    }
    if (cur) out[cur.key].push({ start: cur.start, end: cur.end });
    // Discard ranges shorter than 5 sec (0.083 min) to avoid chart clutter
    for (const k of Object.keys(out)) {
      out[k] = out[k].filter(r => r.end - r.start >= 0.083);
    }
    return out;
  }

  const QUAD_OVERLAY_COLORS = {
    'low-high': { fill: 'rgba(184,217,126,0.12)', border: 'rgba(184,217,126,0.35)' },
    'high-high': { fill: 'rgba(93,202,165,0.12)', border: 'rgba(93,202,165,0.35)' },
    'low-low': { fill: 'rgba(232,152,88,0.12)', border: 'rgba(232,152,88,0.35)' },
    'high-low': { fill: 'rgba(226,75,74,0.12)', border: 'rgba(226,75,74,0.35)' },
  };

  async function renderSession(filenameEncoded) {
    const filename = decodeURIComponent(filenameEncoded || '');
    const s = sessionsIndex[filename];
    if (!s) {
      document.getElementById('view-session').innerHTML = `<div class="stub-panel">Session not found: ${filename}</div>`;
      return;
    }
    currentSummary = s;
    const data = await loadFullSession(filename);
    currentData = data;
    currentQuadRanges = computeQuadrantRanges(data);
    // Sleep detection needs full data — only run here (not indexed for all sessions).
    s.sleepWindows = detectSleepWindows(s, data.hr, data.rmssd);
    // Reset toggles + brush state on every new session open so prior values don't
    // carry across (previously caused out-of-range zoom glitches on short sessions).
    activeQuadrants = { 'low-high': false, 'high-high': false, 'low-low': false, 'high-low': false };
    activeFilters = { event: true, warning: true, palp: true, disconnect: true, delta: true, flush: true, chills: true, posture: true, sleep: true };
    brushMin = null; brushMax = null;
    const meta = parseSessionFilename(filename);
    const dur = formatDuration(s.duration);

    const hrStage = getHRStage(s.hrAvg);
    const maxStage = getHRStage(s.hrMax.v);
    const minStage = getHRStage(s.hrMin.v);

    const el = document.getElementById('view-session');
    el.innerHTML = `
      <div class="session-top-row">
        <a class="back-link" href="#/index">← All sessions</a>
        <div class="tags-inline">
          <span class="tags-inline-label">Tags:</span>
          <span id="tags-current"></span>
          <input class="tag-input" id="tag-input" placeholder="+ add (Enter)" />
        </div>
      </div>
      <div class="summary-bar">
        <div class="summary-stat">
          <span class="summary-stat-label">Date</span>
          <span class="summary-stat-value" style="font-size: 18px;">${meta ? meta.isoDate : '—'}</span>
          <span class="summary-stat-unit">${meta ? meta.isoTime : ''}</span>

        </div>

        <div class="summary-stat">

        </div>
        <div class="summary-stat">

    renderInsight(s);
    renderMarkerList(s);
    renderInterpretation(s);
    drawSessionChart(s, data);
    drawContextChart(s, data);
    wireBrush(s);
    wireFilterChips();
    wireInterpToggle();

    updateResetZoomVisibility();
  }

  // Posture + sleep overrides — stored per session in localStorage so the user can
  // correct bad data in the viewer without rewriting the CSV.
  function loadOverrides() {
    try { return JSON.parse(localStorage.getItem('hrv_viewer_overrides') || '{}'); } catch (e) { return {}; }
  }
  function saveOverrides(o) { try { localStorage.setItem('hrv_viewer_overrides', JSON.stringify(o)); } catch (e) {} }
  function getOverride(filename, key) {
    const all = loadOverrides();
    return all[filename] && all[filename][key];
  }
  function setOverride(filename, key, value) {
    const all = loadOverrides();
    if (!all[filename]) all[filename] = {};
    all[filename][key] = value;
    saveOverrides(all);
  }

  function getEffectivePostureSpans(s) {
    const override = currentSummary && getOverride(currentSummary.filename, 'posture');
    if (override) return override;
    return s.postureSpans;
  }

  function getEffectiveSleepWindows(s) {
    const override = currentSummary && getOverride(currentSummary.filename, 'sleep');
    if (override) return override;
    return s.sleepWindows;
  }

  // Auto-detect sleep windows: sustained >=30 min of low HR + high RMSSD.
  // "Low HR" = within 5 bpm of the session's resting baseline (or bottom quartile).
  // "High RMSSD" = above the session median.
  function detectSleepWindows(s, hrSeries, rmssdSeries) {
    if (!hrSeries || !hrSeries.length || !rmssdSeries || !rmssdSeries.length) return [];
    const restBase = s.restingHR || Math.min(...hrSeries.map(p => p.v));
    const rmssdVals = rmssdSeries.map(p => p.v).sort((a, b) => a - b);
    const rmssdMedian = rmssdVals[Math.floor(rmssdVals.length / 2)];
    // Walk samples; a sample "looks like sleep" if HR <= restBase+5 AND RMSSD >= median.
    // Match RMSSD to HR by nearest-time.
    let rmIdx = 0;
    const spans = [];
    let cur = null;
    for (const p of hrSeries) {
      while (rmIdx + 1 < rmssdSeries.length && Math.abs(rmssdSeries[rmIdx + 1].t - p.t) <= Math.abs(rmssdSeries[rmIdx].t - p.t)) rmIdx++;
      const rmVal = rmssdSeries[rmIdx] ? rmssdSeries[rmIdx].v : null;
      const isSleep = p.v <= restBase + 5 && rmVal != null && rmVal >= rmssdMedian;
      if (isSleep) {
        if (!cur) cur = { start: p.t, end: p.t };
        else cur.end = p.t;
      } else if (cur) {
        if (cur.end - cur.start >= 30) spans.push(cur);
        cur = null;
      }
    }
    if (cur && cur.end - cur.start >= 30) spans.push(cur);
    // Keep longest only (per user request — single dominant sleep window)
    spans.sort((a, b) => (b.end - b.start) - (a.end - a.start));
    return spans.length ? [spans[0]] : [];
  }

  function wireChillsSlider() {
    const slider = document.getElementById('chills-tune-slider');
    const label = document.getElementById('chills-tune-value');
    if (!slider || !label) return;
    const saved = parseFloat(localStorage.getItem('hrv_viewer_chills_ratio') || '2.5');
    slider.value = saved;
    label.textContent = saved.toFixed(1) + '×';
    // Apply saved threshold immediately
    if (saved !== 2.5 && currentData && currentSummary) {
      currentSummary.chillsWindows = detectChillsWindows(currentData.hr, saved);
      renderInsight(currentSummary);
      renderMarkerList(currentSummary);
      drawSessionChart(currentSummary, currentData);
    }
    let debounce;
    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      label.textContent = v.toFixed(1) + '×';
      localStorage.setItem('hrv_viewer_chills_ratio', v.toString());
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        if (!currentData || !currentSummary) return;
        currentSummary.chillsWindows = detectChillsWindows(currentData.hr, v);
        renderInsight(currentSummary);
        renderMarkerList(currentSummary);
        drawSessionChart(currentSummary, currentData);
      }, 180);
    });
  }

  // ===== Tag management (localStorage-backed, per-session) =====
  function loadTags() {
    try { return JSON.parse(localStorage.getItem('hrv_viewer_tags') || '{}'); } catch (e) { return {}; }
  }
  function saveTags(all) {
    try { localStorage.setItem('hrv_viewer_tags', JSON.stringify(all)); } catch (e) {}
  }
  function renderTagsChips(filename) {
    const all = loadTags();
    const mine = all[filename] || [];
    const container = document.getElementById('tags-current');
    container.innerHTML = mine.length === 0
      ? '<span style="color: var(--text-faint); font-size: 12px; font-style: italic;">none yet</span>'
      : mine.map(t => `<span class="tag-chip selected" data-tag="${escape(t)}">${escape(t)} <span class="tag-x" data-remove="${escape(t)}">×</span></span>`).join(' ');
    container.querySelectorAll('.tag-x').forEach(x => {
      x.addEventListener('click', (e) => {
        e.stopPropagation();
        const t = x.dataset.remove;
        const all = loadTags();
        all[filename] = (all[filename] || []).filter(tag => tag !== t);
        saveTags(all);
        renderTagsChips(filename);
      });
    });
  }
  function addTag(filename, tag) {
    tag = tag.trim();
    if (!tag) return;
    const all = loadTags();
    if (!all[filename]) all[filename] = [];
    if (!all[filename].includes(tag)) all[filename].push(tag);
    saveTags(all);
    renderTagsChips(filename);
  }
  function wireTags(filename) {
    renderTagsChips(filename);
    const input = document.getElementById('tag-input');
    input.value = '';
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { addTag(filename, input.value); input.value = ''; }
    });
  }

  function resizeAllViewerCharts() {
    // Force every Chart.js instance in the page to pick up its new container size.
    try { if (currentChart) currentChart.resize(); } catch(e) {}
    try { if (currentContextChart) currentContextChart.resize(); } catch(e) {}
    // Chart.js registry holds refs to every active chart — resize them all.
    if (Chart && Chart.instances) {
      for (const id of Object.keys(Chart.instances)) {
        try { Chart.instances[id].resize(); } catch (e) {}
      }
    }
  }

  function exportReport() {
    // Expand the interp panel so its body shows in the report, then apply printing
    // mode, let Chart.js resize, and open the print dialog. afterprint handler
    // (in init) removes the class and restores chart sizing.
    const interp = document.getElementById('interp-panel');
    const wasCollapsed = interp && interp.classList.contains('collapsed');
    if (interp) interp.classList.remove('collapsed');
    document.body.classList.add('printing');
    requestAnimationFrame(() => {
      resizeAllViewerCharts();
      setTimeout(() => {
        window.print();
        if (wasCollapsed && interp) interp.classList.add('collapsed');
      }, 200);
    });
  }

  // ===== Keyboard nav: ← / → move between adjacent sessions or days =====
  function setupKeyboardNav() {
    document.addEventListener('keydown', (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      const { view, arg } = parseHash();
      const dir = e.key === 'ArrowLeft' ? -1 : 1;
      if (view === 'session') {
        const all = Object.keys(sessionsIndex).sort();
        const idx = all.indexOf(decodeURIComponent(arg || ''));
        if (idx < 0) return;
        const next = idx + dir;
        if (next >= 0 && next < all.length) setHash('session/' + encodeURIComponent(all[next]));
      } else if (view === 'day' || view === 'month' || view === 'week') {
        const btn = document.getElementById(view + (dir < 0 ? '-prev' : '-next'));
        if (btn) btn.click();
      }
    });
  }

  function renderInsight(s) {
    const parts = [];
    parts.push(`Session: ${formatDuration(s.duration)}.`);
    parts.push(`Avg HR ${s.hrAvg} bpm (min ${s.hrMin.v} @ ${formatDuration(s.hrMin.t)}, max ${s.hrMax.v} @ ${formatDuration(s.hrMax.t)}).`);
    if (s.rmssdAvg != null) parts.push(`RMSSD avg ${s.rmssdAvg} ms` + (s.rmssdMin ? `, lowest ${Math.round(s.rmssdMin.v)} @ ${formatDuration(s.rmssdMin.t)}.` : '.'));
    if (s.palpCount > 0) {
      const clusterText = s.palpClusters.length === 1
        ? `1 cluster @ ${formatDuration(s.palpClusters[0].start)}`
        : `${s.palpClusters.length} clusters`;
      parts.push(`${s.palpCount} ectopic beats detected (${clusterText}).`);
    }
    if (s.hrDeltas && s.hrDeltas.length > 0) {
      const rises = s.hrDeltas.filter(d => d.direction === 'rise');
      const drops = s.hrDeltas.filter(d => d.direction === 'drop');
      const biggest = s.hrDeltas.reduce((a, b) => Math.abs(b.delta) > Math.abs(a.delta) ? b : a);
      parts.push(`${s.hrDeltas.length} sudden HR shift${s.hrDeltas.length === 1 ? '' : 's'} detected (${rises.length} rise / ${drops.length} drop). Biggest: ${biggest.direction === 'rise' ? '↑' : '↓'}${Math.abs(biggest.delta)} bpm @ ${formatDuration(biggest.start)}.`);
    }
    if (s.flushes && s.flushes.length > 0) {
      parts.push(`${s.flushes.length} sympathetic flush${s.flushes.length === 1 ? '' : 'es'} detected (fast HR spike with concurrent HRV drop — classic cold-flush / sympathetic-burst signature).`);
    }
    if (s.chillsWindows && s.chillsWindows.length > 0) {
      const total = s.chillsWindows.reduce((x, c) => x + (c.end - c.start), 0);
      parts.push(`${s.chillsWindows.length} chills signature window${s.chillsWindows.length === 1 ? '' : 's'} (${formatDuration(total)} of HR volatility ≥2.5× baseline — possible shivering EMG artifact or autonomic storm).`);
    }
    const sleepForInsight = getEffectiveSleepWindows(s);
    if (sleepForInsight && sleepForInsight.length) {
      const w = sleepForInsight[0];
      parts.push(`Sleep window detected: ${formatDuration(w.end - w.start)} starting at ${formatDuration(w.start)} (low HR + high HRV).`);
    }
    const postureForInsight = getEffectivePostureSpans(s);
    if (postureForInsight && postureForInsight.length) {
      const durByPos = { lying: 0, sitting: 0, standing: 0 };
      for (const p of postureForInsight) durByPos[p.posture] = (durByPos[p.posture] || 0) + (p.end - p.start);
      const parts2 = [];
      if (durByPos.lying > 0) parts2.push(`${formatDuration(durByPos.lying)} lying`);
      if (durByPos.sitting > 0) parts2.push(`${formatDuration(durByPos.sitting)} sitting`);
      if (durByPos.standing > 0) parts2.push(`${formatDuration(durByPos.standing)} standing`);
      if (parts2.length) parts.push(`Posture time: ${parts2.join(', ')}.`);
    }
    if (s.warnCount > 0) {
      const types = Array.from(new Set(s.warnSegs.map(w => w.type))).join(', ');
      parts.push(`${s.warnCount} warning ${s.warnCount === 1 ? 'segment' : 'segments'} (${types}).`);
    }
    if (s.connGaps.length > 0) {
      const longest = s.connGaps.reduce((a, b) => (b.end - b.start) > (a.end - a.start) ? b : a);
      parts.push(`${s.connGaps.length} connection ${s.connGaps.length === 1 ? 'gap' : 'gaps'} (longest ${formatDuration(longest.end - longest.start)}).`);
    }
    if (s.tachyPct > 20) parts.push(`${s.tachyPct}% of session in tachycardia (HR > 100).`);

    document.getElementById('insight-text').textContent = parts.join(' ');
  }

  function renderMarkerList(s) {
    const items = [];
    if (activeFilters.event) {
      for (const e of s.events) items.push({ type: 'event', t: e.t, label: e.label });
    }
    if (activeFilters.warning) {
      for (const w of s.warnSegs) items.push({ type: 'warning', t: w.start, label: warnLabel(w.type) + ' (' + formatDuration(w.end - w.start) + ')' });
    }
    if (activeFilters.palp) {
      for (const c of s.palpClusters) items.push({ type: 'palp', t: c.start, label: c.count === 1 ? 'Ectopic beat' : `${c.count} palpitations in ${formatDuration(c.end - c.start)}` });
    }
    if (activeFilters.disconnect) {
      for (const g of s.connGaps) items.push({ type: 'disconnect', t: g.start, label: `BLE gap · ${formatDuration(g.end - g.start)}` });
    }
    if (activeFilters.delta && s.hrDeltas) {
      for (const d of s.hrDeltas) {
        const arrow = d.direction === 'rise' ? '↑' : '↓';
        items.push({ type: 'delta', t: d.start, label: `${arrow} ${Math.abs(d.delta)} bpm in ${formatDuration(d.end - d.start)} (${d.startHR} → ${d.endHR})` });
      }
    }
    if (activeFilters.flush && s.flushes) {
      for (const f of s.flushes) items.push({ type: 'flush', t: f.t, label: `Sympathetic flush · HR +${f.hrDelta} bpm, HRV ↓${f.rmssdDropPct}%` });
    }
    if (activeFilters.chills && s.chillsWindows) {
      for (const c of s.chillsWindows) items.push({ type: 'chills', t: c.start, label: `Chills signature · ${formatDuration(c.end - c.start)} of high HR volatility` });
    }
    const postureSpansForList = getEffectivePostureSpans(s);
    if (activeFilters.posture && postureSpansForList) {
      for (const p of postureSpansForList) items.push({ type: 'posture', t: p.start, label: `Posture · ${p.posture} (${formatDuration(p.end - p.start)})` });
    }
    const sleepWindowsForList = getEffectiveSleepWindows(s);
    if (activeFilters.sleep && sleepWindowsForList) {
      for (const w of sleepWindowsForList) items.push({ type: 'sleep', t: w.start, label: `Sleep window · ${formatDuration(w.end - w.start)}` });
    }
    items.sort((a, b) => a.t - b.t);
    const el = document.getElementById('marker-list');
    if (!items.length) { el.innerHTML = '<div style="color: var(--text-faint); font-size: 12px; padding: 8px;">No markers to show.</div>'; return; }
    el.innerHTML = items.map(i => `
      <div class="marker-item type-${i.type}" data-t="${i.t}">
        <span class="marker-time">${formatDuration(i.t)}</span>
        <span class="marker-label">${escape(i.label)}</span>
      </div>`).join('');
    el.querySelectorAll('.marker-item').forEach(mi => {
      const t = parseFloat(mi.dataset.t);
      const labelText = mi.querySelector('.marker-label').textContent;
      const tLabel = mi.querySelector('.marker-time').textContent;
      mi.addEventListener('click', () => zoomTo(t));
      mi.addEventListener('mouseenter', (e) => highlightMarker(t, labelText, tLabel, e));
      mi.addEventListener('mouseleave', unhighlightMarker);
    });
  }

  // Hovering a sidebar marker: drop a bright vertical highlight on the chart at that
  // time and show a tooltip anchored to the chart position (fallback: cursor position
  // if the time is outside the currently brushed-in window).
  function highlightMarker(t, labelText, tLabel, evt) {
    if (!currentChart) return;
    const yScale = currentChart.scales.y;
    const yTop = yScale ? yScale.max : 200;
    const yBottom = yScale ? yScale.min : 0;
    const yHR = nearestY(currentData && currentData.hr, t);
    // Find the HL datasets by label
    const ds = currentChart.data.datasets;
    for (let i = 0; i < ds.length; i++) {
      if (ds[i].label === '_HL_LINE') ds[i].data = [{ x: t, y: yBottom }, { x: t, y: yTop }];
      if (ds[i].label === '_HL_POINT') ds[i].data = [{ x: t, y: yHR }];
    }
    currentChart.update('none');
    const xScale = currentChart.scales.x;
    const inView = t >= xScale.min && t <= xScale.max;
    const tip = getAnnoTip();
    tip.innerHTML = `<b>${escape(labelText)}</b><br/>@ ${tLabel}`;
    tip.style.display = 'block';
    if (inView) {
      const rect = currentChart.canvas.getBoundingClientRect();
      const px = xScale.getPixelForValue(t);
      const left = Math.min(window.innerWidth - tip.offsetWidth - 8, Math.max(8, rect.left + px - tip.offsetWidth / 2));
      tip.style.left = left + 'px';
      tip.style.top = (rect.top + 10) + 'px';
    } else if (evt) {
      tip.style.left = Math.min(window.innerWidth - tip.offsetWidth - 8, evt.clientX + 14) + 'px';
      tip.style.top = Math.max(8, evt.clientY - tip.offsetHeight - 8) + 'px';
    }
  }

  function unhighlightMarker() {
    if (!currentChart) return;
    const ds = currentChart.data.datasets;
    for (let i = 0; i < ds.length; i++) {
      if (ds[i].label === '_HL_LINE' || ds[i].label === '_HL_POINT') ds[i].data = [];
    }
    currentChart.update('none');
    hideAnnoTip();
  }

  function nearestY(series, t) {
    if (!series || !series.length) return 0;
    let best = series[0];
    for (const p of series) {
      if (Math.abs(p.x - t) < Math.abs(best.x - t)) best = p;
    }
    return best.y;
  }

  function warnLabel(type) {
    return { 'warn-high': 'HR high', 'warn-low': 'HR low', 'warn-crash': 'HRV crash', 'warn-palp': 'Palpitations' }[type] || type;
  }

  // HR×HRV quadrant: classify the session's averages into one of four autonomic states.
  function classifyQuadrant(hrAvg, rmssdAvg) {
    // HR: "high" = above normal ceiling (user-configured); "low" = at/below low ceiling.
    // Here we just use median-ish thresholds.
    const hrHigh = hrAvg >= colorThresholds.normal; // 90+
    const rmssdHigh = rmssdAvg != null && rmssdAvg >= 40; // ~above typical adult resting
    if (!hrHigh && rmssdHigh) return { key: 'low-high', label: 'Low HR · High HRV', tone: 'Rest / recovery mode — good parasympathetic tone.' };
    if (hrHigh && rmssdHigh) return { key: 'high-high', label: 'High HR · High HRV', tone: 'Post-exertion rebound or regulated arousal.' };
    if (!hrHigh && !rmssdHigh) return { key: 'low-low', label: 'Low HR · Low HRV', tone: 'Fatigue / under-recovery pattern.' };
    return { key: 'high-low', label: 'High HR · Low HRV', tone: 'Sympathetic stress — classic POTS / flare pattern.' };
  }

  function renderInterpretation(s) {
    if (s.rmssdAvg == null) {
      document.getElementById('interp-current').textContent = 'Not enough HRV data to classify.';
      return;
    }
    const q = classifyQuadrant(s.hrAvg, s.rmssdAvg);
    document.getElementById('interp-current').innerHTML =
      `<div style="font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px;">Session average</div>` +
      `<div style="font-size: 16px;">${q.label} — <span style="color: var(--text-dim); font-weight: 500;">${q.tone}</span></div>` +
      `<div style="font-size: 11px; color: var(--text-dim); margin-top: 8px;">Click a card below to highlight the time ranges on the chart that match that quadrant.</div>`;
    // Decorate each cell: show percent of session time, total duration, span count.
    // Empty cells get "none in this session" and are non-clickable.
    const totalSession = s.duration || 1;
    document.querySelectorAll('.interp-cell').forEach(cell => {
      const key = cell.dataset.quad;
      const ranges = (currentQuadRanges && currentQuadRanges[key]) || [];
      const titleEl = cell.querySelector('.interp-title');
      const oldBadge = titleEl.querySelector('.interp-empty-badge');
      if (oldBadge) oldBadge.remove();
      if (ranges.length === 0) {
        const badge = document.createElement('span');
        badge.className = 'interp-empty-badge';
        badge.textContent = 'none in this session';
        titleEl.appendChild(badge);
        cell.classList.add('empty');
        cell.classList.remove('on');
      } else {
        cell.classList.remove('empty');
        const totalMin = ranges.reduce((x, r) => x + (r.end - r.start), 0);
        const pct = Math.round((totalMin / totalSession) * 100);
        const badge = document.createElement('span');
        badge.className = 'interp-empty-badge';
        badge.style.color = 'var(--text-dim)';
        badge.style.fontStyle = 'normal';
        badge.style.fontWeight = '700';
        badge.textContent = `${pct}% · ${formatDuration(totalMin)}`;
        titleEl.appendChild(badge);
      }
    });
  }

  function wireQuadrantToggles() {
    document.querySelectorAll('.interp-cell').forEach(cell => {
      cell.addEventListener('click', () => {
        if (cell.classList.contains('empty')) return;
        const key = cell.dataset.quad;
        activeQuadrants[key] = !activeQuadrants[key];
        cell.classList.toggle('on', activeQuadrants[key]);
        if (currentSummary && currentData) drawSessionChart(currentSummary, currentData);
      });
    });
  }

  function wireInterpToggle() {
    const panel = document.getElementById('interp-panel');
    const head = document.getElementById('interp-head');
    // Default collapsed state from localStorage
    const saved = localStorage.getItem('hrv_viewer_interp_collapsed') === 'true';
    panel.classList.toggle('collapsed', saved);
    head.addEventListener('click', () => {
      panel.classList.toggle('collapsed');
      localStorage.setItem('hrv_viewer_interp_collapsed', panel.classList.contains('collapsed'));
    });
  }

  function wireSidebarToggle() {
    const layout = document.getElementById('session-layout');
    const btn = document.getElementById('sidebar-toggle');
    const saved = localStorage.getItem('hrv_viewer_sidebar_collapsed') === 'true';
    layout.classList.toggle('sidebar-collapsed', saved);
    btn.addEventListener('click', () => {
      layout.classList.toggle('sidebar-collapsed');
      localStorage.setItem('hrv_viewer_sidebar_collapsed', layout.classList.contains('sidebar-collapsed'));
      // Chart needs to resize when the container width changes
      setTimeout(() => currentChart && currentChart.resize(), 260);

  // Floating tooltip used for annotation hover (warning bands, gaps, events)
  function getAnnoTip() {
    let tip = document.getElementById('anno-tip');
    if (!tip) {
      tip = document.createElement('div');
      tip.id = 'anno-tip';
      document.body.appendChild(tip);
    }
    return tip;
  }
  function showAnnoTip(text, evt) {
    const tip = getAnnoTip();
    tip.innerHTML = text;
    tip.style.display = 'block';
    // Chart.js annotation plugin wraps DOM events in {native, x, y, ...}
    const e = evt && evt.native ? evt.native : evt;
    const cx = (e && e.clientX) || 0;
    const cy = (e && e.clientY) || 0;
    const pad = 14;
    tip.style.left = Math.min(window.innerWidth - tip.offsetWidth - 8, cx + pad) + 'px';
    tip.style.top = Math.max(8, cy - tip.offsetHeight - 8) + 'px';
  }
  function hideAnnoTip() {
    const tip = document.getElementById('anno-tip');
    if (tip) tip.style.display = 'none';
  }

  function wireFilterChips() {
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const t = chip.dataset.type;
        activeFilters[t] = !activeFilters[t];
        chip.classList.toggle('active', activeFilters[t]);
        if (currentSummary) {
          renderMarkerList(currentSummary);
          drawSessionChart(currentSummary, currentData);
        }
      });
    });
  }

  function drawSessionChart(s, data) {
    const ctx = document.getElementById('session-chart').getContext('2d');
    if (currentChart) currentChart.destroy();

    const hr = downsample(data.hr, 2000);
    const rmssd = downsample(data.rmssd, 2000);

    // Palpitation cluster dots (one dot per cluster, sized by count)
    const palpDots = activeFilters.palp ? s.palpClusters.map(c => {
      const midT = (c.start + c.end) / 2;
      // Find HR value near this time
      const near = data.hr.reduce((best, p) => Math.abs(p.x - midT) < Math.abs(best.x - midT) ? p : best, data.hr[0]);
      return { x: midT, y: near.y, _count: c.count, _start: c.start, _end: c.end };
    }) : [];

    // Build annotations (warnings as bands, disconnects as grey masks, events as vertical lines, max/min labels)
    const annotations = {};
    let idCounter = 0;

    // Quadrant overlays (drawn first so they sit below other bands).
    if (currentQuadRanges) {
      const QUAD_LABELS = {
        'low-high': 'Low HR · High HRV (rest/recovery)',
        'high-high': 'High HR · High HRV (rebound)',
        'low-low': 'Low HR · Low HRV (fatigue)',
        'high-low': 'High HR · Low HRV (sympathetic stress)',
      };
      for (const key of Object.keys(activeQuadrants)) {
        if (!activeQuadrants[key]) continue;
        const color = QUAD_OVERLAY_COLORS[key];
        const label = QUAD_LABELS[key];
        const ranges = currentQuadRanges[key] || [];
        for (const r of ranges) {
          annotations['quad_' + idCounter++] = {
            type: 'box',
            xScaleID: 'x',
            xMin: r.start, xMax: r.end,
            backgroundColor: color.fill,
            borderColor: color.border,
            borderWidth: 1,
            drawTime: 'beforeDatasetsDraw',
            enter: (ctx, evt) => showAnnoTip(`<b>${label}</b><br/>${formatDuration(r.start)} → ${formatDuration(r.end)} (${formatDuration(r.end - r.start)})`, evt),
            leave: hideAnnoTip,
          };
        }
      }
    }

    if (activeFilters.warning) {
      for (const w of s.warnSegs) {
        const label = warnLabel(w.type);
        const dur = formatDuration(w.end - w.start);
        annotations['warn_' + idCounter++] = {
          type: 'box',
          xScaleID: 'x',
          xMin: w.start, xMax: w.end,
          backgroundColor: 'rgba(232,152,88,0.12)',
          borderColor: 'rgba(232,152,88,0.45)',
          borderWidth: 1,
          drawTime: 'beforeDatasetsDraw',
          enter: (ctx, evt) => showAnnoTip(`<b>${label}</b><br/>${formatDuration(w.start)} → ${formatDuration(w.end)} (${dur})`, evt),
          leave: hideAnnoTip,
        };
      }
    }
    if (activeFilters.disconnect) {
      for (const g of s.connGaps) {
        const dur = formatDuration(g.end - g.start);
        annotations['gap_' + idCounter++] = {
          type: 'box',
          xScaleID: 'x',
          xMin: g.start, xMax: g.end,
          backgroundColor: 'rgba(120,120,120,0.30)',
          borderColor: 'rgba(160,160,160,0.55)',
          borderWidth: 1,
          drawTime: 'beforeDatasetsDraw',
          enter: (ctx, evt) => showAnnoTip(`<b>BLE connection gap</b><br/>${formatDuration(g.start)} → ${formatDuration(g.end)} (${dur})<br/><span style="color: var(--text-dim);">No HR data during this span.</span>`, evt),
          leave: hideAnnoTip,
        };
      }
    }
    if (activeFilters.delta && s.hrDeltas) {
      for (const d of s.hrDeltas) {
        const arrow = d.direction === 'rise' ? '↑' : '↓';
        const color = d.direction === 'rise' ? 'rgba(139,180,255,0.35)' : 'rgba(180,140,255,0.35)';
        const fill = d.direction === 'rise' ? 'rgba(139,180,255,0.10)' : 'rgba(180,140,255,0.10)';
        annotations['delta_' + idCounter++] = {
          type: 'box',
          xScaleID: 'x',
          xMin: d.start, xMax: d.end,
          backgroundColor: fill,
          borderColor: color,
          borderWidth: 1,
          drawTime: 'beforeDatasetsDraw',
          enter: (ctx, evt) => showAnnoTip(`<b>HR shift ${arrow} ${Math.abs(d.delta)} bpm</b><br/>${d.startHR} → ${d.endHR} bpm over ${formatDuration(d.end - d.start)}<br/>${formatDuration(d.start)} → ${formatDuration(d.end)}`, evt),
          leave: hideAnnoTip,
        };
      }
    }
    if (activeFilters.event) {
      for (const e of s.events) {
        const eLabel = e.label;
        const eTime = formatDuration(e.t);
        annotations['ev_' + idCounter++] = {
          type: 'line',
          xScaleID: 'x',
          xMin: e.t, xMax: e.t,
          borderColor: 'rgba(93,202,165,0.75)',
          borderWidth: 1.5,
          borderDash: [3, 3],
          label: { display: true, content: e.label, position: 'start', backgroundColor: 'rgba(93,202,165,0.18)', color: '#B8D97E', font: { size: 11, weight: '600' }, padding: 4 },
          enter: (ctx, evt) => showAnnoTip(`<b>Event</b><br/>${escape(eLabel)} @ ${eTime}`, evt),
          leave: hideAnnoTip,
        };
      }
    }
    // Auto-detected sympathetic flush (short fast HR spike + concurrent HRV drop)
    if (activeFilters.flush && s.flushes) {
      for (const f of s.flushes) {
        annotations['flush_' + idCounter++] = {
          type: 'box',
          xScaleID: 'x',
          xMin: f.start, xMax: f.end,
          backgroundColor: 'rgba(232,168,88,0.12)',
          borderColor: 'rgba(232,168,88,0.6)',
          borderWidth: 1,
          drawTime: 'beforeDatasetsDraw',
          enter: (ctx, evt) => showAnnoTip(`<b>Sympathetic flush</b><br/>HR +${f.hrDelta} bpm in ${formatDuration(f.end - f.start)}<br/>RMSSD ↓${f.rmssdDropPct}%<br/><span style='color: var(--text-dim);'>Cold flush / sudden arousal signature</span>`, evt),
          leave: hideAnnoTip,
        };
      }
    }
    // Posture bands (background tints behind all data)
    const postureSpans = getEffectivePostureSpans(s);
    if (activeFilters.posture && postureSpans && postureSpans.length) {
      const POSTURE_COLORS = {
        'lying': { fill: 'rgba(125,184,232,0.08)', border: 'rgba(125,184,232,0.35)' },
        'sitting': { fill: 'rgba(184,217,126,0.05)', border: 'rgba(184,217,126,0.25)' },
        'standing': { fill: 'rgba(232,152,88,0.08)', border: 'rgba(232,152,88,0.35)' },
      };
      for (const sp of postureSpans) {
        const c = POSTURE_COLORS[sp.posture];
        if (!c) continue;
        annotations['posture_' + idCounter++] = {
          type: 'box',
          xScaleID: 'x',
          xMin: sp.start, xMax: sp.end,
          backgroundColor: c.fill,
          borderColor: c.border,
          borderWidth: 0,
          drawTime: 'beforeDatasetsDraw',
          enter: (ctx, evt) => showAnnoTip(`<b>Posture: ${sp.posture}</b><br/>${formatDuration(sp.start)} → ${formatDuration(sp.end)} (${formatDuration(sp.end - sp.start)})`, evt),
          leave: hideAnnoTip,
        };
      }
    }
    // Sleep windows (dim blue band)
    const sleepWindows = getEffectiveSleepWindows(s);
    if (activeFilters.sleep && sleepWindows && sleepWindows.length) {
      for (const w of sleepWindows) {
        annotations['sleep_' + idCounter++] = {
          type: 'box',
          xScaleID: 'x',
          xMin: w.start, xMax: w.end,
          backgroundColor: 'rgba(110,140,200,0.10)',
          borderColor: 'rgba(110,140,200,0.4)',
          borderWidth: 1,
          borderDash: [4, 4],
          drawTime: 'beforeDatasetsDraw',
          enter: (ctx, evt) => showAnnoTip(`<b>Sleep window</b><br/>${formatDuration(w.start)} → ${formatDuration(w.end)} (${formatDuration(w.end - w.start)})`, evt),
          leave: hideAnnoTip,
        };
      }
    }
    // Auto-detected chills signature (high HR volatility — possible shivering EMG artifact)
    if (activeFilters.chills && s.chillsWindows) {
      for (const c of s.chillsWindows) {
        annotations['chills_' + idCounter++] = {
          type: 'box',
          xScaleID: 'x',
          xMin: c.start, xMax: c.end,
          backgroundColor: 'rgba(133,183,235,0.12)',
          borderColor: 'rgba(133,183,235,0.6)',
          borderWidth: 1,
          drawTime: 'beforeDatasetsDraw',
          enter: (ctx, evt) => showAnnoTip(`<b>Chills signature</b><br/>High HR volatility (std ${c.std.toFixed(1)} bpm, ${c.ratio.toFixed(1)}× session baseline)<br/><span style='color: var(--text-dim);'>Possible shivering EMG artifact or autonomic storm</span>`, evt),
          leave: hideAnnoTip,
        };
      }
    }
    // Max/min markers (always shown)
    annotations['maxHR'] = {
      type: 'point',
      xScaleID: 'x', yScaleID: 'y',
      xValue: s.hrMax.t, yValue: s.hrMax.v,
      backgroundColor: STAGE_COLORS[getHRStage(s.hrMax.v)],
      radius: 5, borderWidth: 2, borderColor: '#000',
    };
    annotations['maxHR_label'] = {
      type: 'label',
      xScaleID: 'x', yScaleID: 'y',
      xValue: s.hrMax.t, yValue: s.hrMax.v,
      content: [`MAX ${s.hrMax.v}`],
      color: STAGE_COLORS[getHRStage(s.hrMax.v)],
      font: { size: 10, weight: 'bold' },
      position: { x: 'center', y: 'start' },
      yAdjust: -14,
      backgroundColor: 'rgba(10,10,10,0.8)',
      padding: 3,
    };
    annotations['minHR'] = {
      type: 'point',
      xScaleID: 'x', yScaleID: 'y',
      xValue: s.hrMin.t, yValue: s.hrMin.v,
      backgroundColor: STAGE_COLORS[getHRStage(s.hrMin.v)],
      radius: 5, borderWidth: 2, borderColor: '#000',
    };
    annotations['minHR_label'] = {
      type: 'label',
      xScaleID: 'x', yScaleID: 'y',
      xValue: s.hrMin.t, yValue: s.hrMin.v,
      content: [`MIN ${s.hrMin.v}`],
      color: STAGE_COLORS[getHRStage(s.hrMin.v)],
      font: { size: 10, weight: 'bold' },
      yAdjust: 14,
      backgroundColor: 'rgba(10,10,10,0.8)',
      padding: 3,
    };

    // Kill stale tooltip when pointer leaves the canvas entirely.
    const canvasEl = document.getElementById('session-chart');
    canvasEl.addEventListener('mouseleave', hideAnnoTip);
    currentChart = new Chart(ctx, {
      type: 'line',
      data: {
        datasets: [
          { label: 'HR', data: hr, borderColor: '#E89858', backgroundColor: 'rgba(232,152,88,0.06)', yAxisID: 'y', tension: 0, cubicInterpolationMode: 'monotone', pointRadius: 0, borderWidth: 1.5, fill: true },
          { label: 'RMSSD', data: rmssd, borderColor: '#5DCAA5', backgroundColor: 'transparent', yAxisID: 'y1', tension: 0, cubicInterpolationMode: 'monotone', pointRadius: 0, borderWidth: 1.5, borderDash: [3, 3] },
          { label: 'Palp', data: palpDots, borderColor: 'transparent', backgroundColor: '#D76CBA', yAxisID: 'y', showLine: false, pointRadius: palpDots.map(p => Math.min(3 + p._count, 10)), pointHoverRadius: 12, pointStyle: 'circle' },
          // Highlight overlay datasets for marker-list hover (populated on demand)
          { label: '_HL_LINE', data: [], borderColor: '#ffffff', backgroundColor: 'transparent', yAxisID: 'y', showLine: true, pointRadius: 0, borderWidth: 2, fill: false, order: -1 },
          { label: '_HL_POINT', data: [], borderColor: '#000', backgroundColor: '#ffffff', yAxisID: 'y', showLine: false, pointRadius: 6, pointStyle: 'circle', pointBorderWidth: 2, order: -2 },
        ],
      },
      options: {

          tooltip: {

              label: (ctx) => {

                if (ctx.dataset.label === 'Palp') {
                  const p = ctx.raw;
                  return p._count === 1 ? `Ectopic beat` : `${p._count} palps in ${formatDuration(p._end - p._start)}`;
                }
                if (ctx.dataset.label === 'HR') return `HR ${Math.round(ctx.parsed.y)} bpm`;
                if (ctx.dataset.label === 'RMSSD') return `RMSSD ${Math.round(ctx.parsed.y)} ms`;
                return '';

            },
            backgroundColor: 'rgba(15,15,15,0.97)',
            borderColor: '#2a2a2a',
            borderWidth: 1,
            titleColor: '#d8d8d8',
            bodyColor: '#d8d8d8',

            bodyFont: { size: 13 },
            padding: 10,
            boxPadding: 4,

        },
        scales: {
          x: {
            type: 'linear',
            min: brushMin !== null ? brushMin : 0,

            ticks: { color: '#9a9a9a', font: { size: 12 }, callback: v => formatDuration(v) },
            grid: { color: 'rgba(255,255,255,0.04)' },

  }

  function wireBrush(s) {
    const overlay = document.getElementById('context-overlay');
    const brush = document.getElementById('context-brush');
    const duration = s.duration;
    let drag = null; // {mode: 'pan'|'left'|'right'|'create', startX, startMin, startMax}

    function xToMin(x) {
      const w = overlay.clientWidth;
      return Math.max(0, Math.min(duration, (x / w) * duration));
    }
    const dimLeft = document.getElementById('context-dim-left');
    const dimRight = document.getElementById('context-dim-right');
    function renderBrush() {
      // Hard safety clamp - prevents out-of-range drift from edge-case drag math.
      if (brushMin < 0 || !isFinite(brushMin)) brushMin = 0;
      if (brushMax > duration || !isFinite(brushMax)) brushMax = duration;
      if (brushMax - brushMin < 0.01) brushMax = Math.min(duration, brushMin + 0.01);
      const w = overlay.clientWidth;
      const lo = (brushMin / duration) * w;
      const hi = (brushMax / duration) * w;
      brush.style.left = lo + 'px';
      brush.style.width = (hi - lo) + 'px';
      if (dimLeft) { dimLeft.style.left = '0px'; dimLeft.style.width = lo + 'px'; }
      if (dimRight) { dimRight.style.left = hi + 'px'; dimRight.style.width = (w - hi) + 'px'; }
      if (currentChart) {
        currentChart.options.scales.x.min = brushMin;
        currentChart.options.scales.x.max = brushMax;
        currentChart.update('none');
      }
      updateResetZoomVisibility();
    }

    // Default brush = data range (trims leading / trailing empty time)
    if (brushMin === null || brushMax === null) {
      const r = getDataRange();
      brushMin = r.start; brushMax = r.end;
    }
    renderBrush();

    overlay.addEventListener('mousedown', (e) => {
      const rect = overlay.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const w = rect.width;
      const loPx = (brushMin / duration) * w;
      const hiPx = (brushMax / duration) * w;
      let mode = 'create';
      if (Math.abs(x - loPx) < 6) mode = 'left';
      else if (Math.abs(x - hiPx) < 6) mode = 'right';
      else if (x > loPx && x < hiPx) mode = 'pan';
      drag = { mode, startX: x, startMin: brushMin, startMax: brushMax };
      if (mode === 'create') {
        brushMin = xToMin(x); brushMax = brushMin + 0.01;
        renderBrush();
      }
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!drag) return;
      const rect = overlay.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const curMin = xToMin(x);
      if (drag.mode === 'left') {
        brushMin = Math.min(curMin, brushMax - 0.05);
      } else if (drag.mode === 'right') {
        brushMax = Math.max(curMin, brushMin + 0.05);
      } else if (drag.mode === 'pan') {
        const span = drag.startMax - drag.startMin;
        const dx = ((x - drag.startX) / rect.width) * duration;
        let newMin = drag.startMin + dx;
        let newMax = drag.startMax + dx;
        if (newMin < 0) { newMax -= newMin; newMin = 0; }
        if (newMax > duration) { newMin -= (newMax - duration); newMax = duration; }
        brushMin = newMin; brushMax = newMax;
      } else if (drag.mode === 'create') {
        brushMax = Math.max(brushMin + 0.05, curMin);
      }
      renderBrush();
    });
    window.addEventListener('mouseup', () => {
      if (drag && drag.mode === 'create' && (brushMax - brushMin) < 0.1) {
        // Too small -> reset to full
        brushMin = 0; brushMax = duration;
        renderBrush();
      }
      drag = null;
    });
    // Double-click overlay to reset
    overlay.addEventListener('dblclick', () => {
      brushMin = 0; brushMax = duration;
      renderBrush();
    });
  }

  // Shared: sync the brush visual + dim masks + main chart to the current brushMin/Max.
  function paintBrush() {
    if (!currentSummary) return;
    const d = currentSummary.duration;
    const overlay = document.getElementById('context-overlay');
    const brush = document.getElementById('context-brush');
    const dimLeft = document.getElementById('context-dim-left');
    const dimRight = document.getElementById('context-dim-right');
    if (!overlay || !brush) return;
    const w = overlay.clientWidth;
    const lo = (brushMin / d) * w;
    const hi = (brushMax / d) * w;
    brush.style.left = lo + 'px';
    brush.style.width = (hi - lo) + 'px';
    if (dimLeft) { dimLeft.style.left = '0px'; dimLeft.style.width = lo + 'px'; }
    if (dimRight) { dimRight.style.left = hi + 'px'; dimRight.style.width = (w - hi) + 'px'; }
    if (currentChart) {
      currentChart.options.scales.x.min = brushMin;
      currentChart.options.scales.x.max = brushMax;
      currentChart.update('none');
    }
    updateResetZoomVisibility();
  }

  function zoomTo(t, span) {
    if (!currentSummary) return;
    const s = currentSummary;
    const halfSpan = (span || Math.max(0.5, s.duration * 0.04)) / 2;
    brushMin = Math.max(0, t - halfSpan);
    brushMax = Math.min(s.duration, t + halfSpan * 2);
    paintBrush();
  }

  // "Reset zoom" = back to the data range (skips leading/trailing empty time).
  function resetZoom() {
    if (!currentSummary) return;
    const r = getDataRange();
    brushMin = r.start;
    brushMax = r.end;
    paintBrush();
  }

  // Walk the HR series to find the actual filled span - skips leading and trailing
  // BLE gaps so "Reset zoom" takes you to the data, not a black empty void.
  function getDataRange() {
    if (!currentSummary) return { start: 0, end: 1 };
    const d = currentSummary.duration;
    if (!currentData || !currentData.hr.length) return { start: 0, end: d };
    const first = currentData.hr[0].x;
    const last = currentData.hr[currentData.hr.length - 1].x;
    return { start: Math.max(0, first), end: Math.min(d, last) };
  }

  function updateResetZoomVisibility() {
    const btn = document.getElementById('reset-zoom');
    if (!btn || !currentSummary) return;
    const r = getDataRange();
    const atDefault = Math.abs(brushMin - r.start) < 0.001 && Math.abs(brushMax - r.end) < 0.001;
    btn.classList.toggle('hidden', atDefault);
  }

  // ===== Utilities =====
  function formatDuration(min) {
    if (min == null || isNaN(min)) return '—';
    const totalSec = Math.round(min * 60);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function escape(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ===== Init =====
  async function init() {
    await restoreFolder();
    if (dirHandle) {
      // Try silent permission check first
      const perm = await dirHandle.queryPermission({ mode: 'read' });
      if (perm === 'granted') {
        await loadSessions();
      }
      // If not granted, user will need to click pick / an interaction to re-grant
    }
    // If nothing happens yet, route() will show empty-state
    route();

    window.addEventListener('hashchange', route);
    document.getElementById('folder-pick').addEventListener('click', pickFolder);
    document.getElementById('empty-pick').addEventListener('click', pickFolder);
    document.getElementById('export-report').addEventListener('click', exportReport);
    setupKeyboardNav();

    // Restore chart sizing after the print dialog closes
    window.addEventListener('afterprint', () => {
      document.body.classList.remove('printing');
      resizeAllViewerCharts();
    });
    // Default to the month calendar if no hash is set yet.
    if (!location.hash) setHash('month');
  }
  init();
})();
</script>
</body>
