name: Build Android APK

# Capacitor wrapper of the HR Monitor web app. Resurrected 2026-04-21
# after the native-Compose pivot proved unable to reproduce Capacitor's
# already-working BLE in background. The known-broken bit (WebSocket
# buffering during screen-off) is being addressed by a native Capacitor
# plugin in mobile/android-overlay/, NOT by replacing the whole stack.
#
# Builds a debug-signed APK on every push to main and publishes it to a
# rolling "android-latest" GitHub Release at:
# https://github.com/Nakauri/hr-monitor/releases/latest/download/hr-monitor.apk

on:
  push:
    branches: [main]
    paths:
      - 'hr_monitor.html'
      - 'overlay.html'
      - 'hrv_viewer.html'
      - 'index.html'
      - 'widget.css'
      - 'widget.js'
      - 'mobile/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Copy web files into mobile/www
        working-directory: mobile
        run: npm run copy-web

      - name: Generate Android project
        working-directory: mobile
        run: npx cap add android

      - name: Apply Android overlay
        working-directory: mobile
        run: |
          if [ -d android-overlay ]; then
            cp -rv android-overlay/. android/
            echo "[overlay] applied customizations from mobile/android-overlay/"
          fi

      - name: Inject server_client_id into Android strings
        working-directory: mobile/android
        run: |
          STRINGS_FILE="app/src/main/res/values/strings.xml"
          if ! grep -q "server_client_id" "$STRINGS_FILE"; then
            sed -i 's|</resources>|    <string name="server_client_id">103129946542-0ll0ojj36a38p52c20uebfl8jnu59ona.apps.googleusercontent.com</string>\n</resources>|' "$STRINGS_FILE"
          fi

      - name: Check for signing secret
        id: check-signing
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — building with debug keystore."
          fi

      - name: Configure release signing
        if: steps.check-signing.outputs.has_keystore == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > mobile/android/app/release.keystore
          cat mobile/android-overlay/app/signing-append.gradle >> mobile/android/app/build.gradle

      - name: Append OkHttp dependency for NativeRelaySocketPlugin
        run: |
          # The native WebSocket plugin uses OkHttp directly. Capacitor 6
          # doesn't ship okhttp3 on the app module's classpath by default,
          # so we append a single-line dependencies block to the
          # Capacitor-generated app/build.gradle. Multiple dependencies
          # blocks in one Gradle file merge — no conflict with the auto-
          # generated one above.
          cat >> mobile/android/app/build.gradle <<'EOF'

          dependencies {
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }
          EOF

      - name: Capacitor sync
        working-directory: mobile
        run: npx cap sync android

      - name: Inject Android manifest additions
        working-directory: mobile
        run: node scripts/inject-manifest.js

      - name: Build debug APK
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK for release
        run: |
          mkdir -p release
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk release/hr-monitor.apk
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > release/version.json <<EOF
          {
            "sha": "${{ github.sha }}",
            "shortSha": "$SHORT_SHA",
            "builtAt": "$BUILD_DATE",
            "signed": "${{ steps.check-signing.outputs.has_keystore }}"
          }
          EOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hr-monitor-debug-${{ github.sha }}
          path: release/hr-monitor.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish rolling GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android build (rolling latest)
          body: |
            Latest Capacitor build from `main`.

            Install from your phone's browser:
            https://github.com/${{ github.repository }}/releases/latest/download/hr-monitor.apk

            Built from commit ${{ github.sha }}.
            signed: ${{ steps.check-signing.outputs.has_keystore }}
          files: |
            release/hr-monitor.apk
            release/version.json
          prerelease: false
          make_latest: true
