name: Build Android APK

# Build a debug APK of the Capacitor Android wrapper on every push to main
# (and on demand via workflow_dispatch). The APK is:
#   1. Uploaded as a workflow artifact (zipped — requires GitHub login).
#   2. Published to a rolling "android-latest" GitHub Release so it's
#      available at a stable public URL:
#      https://github.com/Nakauri/hr-monitor/releases/latest/download/hr-monitor.apk
#      That URL is what index.html's Download for Android button links to.
#
# We regenerate mobile/android/ on every run so the repo stays clean. Any
# Android-side customizations (manifest edits, res overlays, gradle tweaks)
# live in mobile/android-overlay/ and are copied on top of the freshly
# generated project. Keeps the repo free of the ~2-GB Android build tree
# without losing reproducibility.

on:
  push:
    branches: [main]
    paths:
      - 'hr_monitor.html'
      - 'overlay.html'
      - 'hrv_viewer.html'
      - 'index.html'
      - 'widget.css'
      - 'widget.js'
      - 'mobile/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

# softprops/action-gh-release needs write access to create/update releases.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm install

      - name: Copy web files into mobile/www
        working-directory: mobile
        run: npm run copy-web

      - name: Generate Android project
        working-directory: mobile
        run: npx cap add android
        # "cap add android" is idempotent-ish: it refuses to overwrite if the
        # android/ folder already exists. Since we regenerate every run and
        # the folder isn't checked in, this always runs fresh.

      - name: Apply Android overlay
        working-directory: mobile
        run: |
          if [ -d android-overlay ]; then
            cp -rv android-overlay/. android/
            echo "[overlay] applied customizations from mobile/android-overlay/"
          else
            echo "[overlay] no overlay directory — using stock Capacitor Android project"
          fi

      - name: Inject server_client_id into Android strings
        working-directory: mobile/android
        run: |
          # @codetrix-studio/capacitor-google-auth reads server_client_id from
          # strings.xml at runtime. Inject it if the Capacitor-generated file
          # doesn't have it already.
          STRINGS_FILE="app/src/main/res/values/strings.xml"
          if ! grep -q "server_client_id" "$STRINGS_FILE"; then
            sed -i 's|</resources>|    <string name="server_client_id">103129946542-0ll0ojj36a38p52c20uebfl8jnu59ona.apps.googleusercontent.com</string>\n</resources>|' "$STRINGS_FILE"
            echo "[strings] server_client_id injected"
          fi

      - name: Check for signing secret
        id: check-signing
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS" ]; then
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — building with Capacitor debug keystore. Google Sign-In will fail until a stable keystore is configured."
          fi

      - name: Configure release signing
        if: steps.check-signing.outputs.has_keystore == 'true'
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Write the keystore from the GH secret. Append a signingConfigs
          # block + apply it to both debug and release buildTypes, so the
          # APK has a stable SHA-1 that matches what Google Cloud Console
          # has registered for our Android OAuth client.
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release.keystore
          cat >> app/build.gradle <<'GRADLE'

android {
    signingConfigs {
        release {
            storeFile file("release.keystore")
            storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
            keyAlias System.getenv("ANDROID_KEY_ALIAS")
            keyPassword System.getenv("ANDROID_KEY_PASSWORD")
        }
    }
    buildTypes {
        debug { signingConfig signingConfigs.release }
        release { signingConfig signingConfigs.release }
    }
}
GRADLE
          echo "[signing] release keystore wired"

      - name: Capacitor sync
        working-directory: mobile
        run: npx cap sync android

      - name: Build debug APK
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK for release
        run: |
          mkdir -p release
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk release/hr-monitor.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hr-monitor-debug-${{ github.sha }}
          path: release/hr-monitor.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish rolling GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Android build (rolling latest)
          body: |
            Latest Android build from `main`.

            Install from your phone's browser:
            https://github.com/${{ github.repository }}/releases/latest/download/hr-monitor.apk

            Built from commit ${{ github.sha }}.
          files: release/hr-monitor.apk
          prerelease: false
          make_latest: true
